<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EYAD HYPERTROPHY SYSTEM – ULTIMATE EDITION</title>

<!-- ===================== FONTS ===================== -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ===================== GLOBAL ===================== */
:root{
    --bg:#0a0a0f;
    --card:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.1);
    --blue:#00d4ff;
    --violet:#7a5cff;
    --text:#eaeaea;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Inter",sans-serif;
}

body{
    background:linear-gradient(145deg,#050508,#0a0a12);
    color:var(--text);
    overflow-x:hidden;
}

/* ===================== LOADER ===================== */
#loader{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    animation:fadeOut 1s ease 2s forwards;
}

.loader-text{
    font-family:"Orbitron";
    font-size:32px;
    letter-spacing:5px;
    background:linear-gradient(90deg,var(--blue),var(--violet));
    -webkit-background-clip:text;
    color:transparent;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:.3}
    50%{opacity:1}
    100%{opacity:.3}
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden}
}

/* ===================== NAV ===================== */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:100;
}

nav h1{
    font-family:"Orbitron";
    font-size:18px;
    color:var(--blue);
}

nav button{
    background:none;
    border:1px solid var(--border);
    color:var(--text);
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
}

/* ===================== GRID ===================== */
.container{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

/* ===================== CARD ===================== */
.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:15px;
    backdrop-filter:blur(15px);
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-5px);
    border-color:var(--blue);
}

.card h3{
    margin-bottom:10px;
}

/* ===================== WORKOUT ===================== */
#workoutPage{
    display:none;
}

.exercise{
    margin-bottom:20px;
    padding:15px;
    border-radius:12px;
    background:rgba(255,255,255,0.03);
}

.set-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

input{
    width:70px;
    padding:6px;
    border-radius:6px;
    border:1px solid var(--border);
    background:#111;
    color:#fff;
}

/* ===================== BUTTON ===================== */
.btn{
    background:linear-gradient(90deg,var(--blue),var(--violet));
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

/* ===================== TIMER ===================== */
.timer{
    font-size:18px;
    margin:10px 0;
}

/* ===================== PROGRESS ===================== */
.progress-bar{
    height:8px;
    background:#111;
    border-radius:5px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--blue),var(--violet));
}

/* ===================== HISTORY ===================== */
#historyPage{
    display:none;
}

/* ===================== PR ===================== */
#prPage{
    display:none;
}

/* ===================== RESPONSIVE ===================== */
@media(max-width:600px){
    nav h1{font-size:14px}
}
</style>
</head>

<body>

<div id="loader">
    <div class="loader-text">EYAD</div>
</div>

<nav>
    <h1>EYAD HYPERTROPHY SYSTEM</h1>
    <div>
        <button onclick="showDashboard()">Dashboard</button>
        <button onclick="showHistory()">History</button>
        <button onclick="showPR()">PR</button>
    </div>
</nav>

<div class="container">

<!-- ===================== DASHBOARD ===================== -->
<div id="dashboard">
    <h2>Training Split</h2>
    <div class="grid" id="splitGrid"></div>
</div>

<!-- ===================== WORKOUT ===================== -->
<div id="workoutPage">
    <h2 id="workoutTitle"></h2>
    <div class="timer">Time: <span id="time">0</span>s</div>
    <div id="exerciseContainer"></div>
    <button class="btn" onclick="finishWorkout()">Finish Workout</button>
</div>

<!-- ===================== HISTORY ===================== -->
<div id="historyPage">
    <h2>History</h2>
    <div id="historyList"></div>
</div>

<!-- ===================== PR ===================== -->
<div id="prPage">
    <h2>Personal Records</h2>
    <div id="prList"></div>
</div>

</div>

<script>
/* ===================== DATA ===================== */

const program = {
"Posterior A":[
{name:"Incline Chest Press",sets:2},
{name:"Flat Bench Press",sets:2},
{name:"Decline Bench Press",sets:2},
{name:"Shoulder Press",sets:2},
{name:"Lateral Raises",sets:2},
{name:"Incline Dumbbell Curl",sets:3},
{name:"Preacher Curl",sets:2},
{name:"Hammer Curl",sets:2},
{name:"Leg Extension",sets:3},
{name:"Adductor Machine",sets:2}
],

"Anterior A":[
{name:"T-Bar Row",sets:2},
{name:"Lat Pulldown",sets:2},
{name:"Straight Arm Pulldown",sets:2},
{name:"Rear Delt Fly",sets:3},
{name:"Overhead Triceps Extension",sets:3},
{name:"Triceps Pushdown",sets:2},
{name:"Single Arm Cable Pushdown",sets:2},
{name:"Leg Press",sets:3},
{name:"Standing Calf Raise",sets:3},
{name:"Back Extension",sets:2}
],

"Posterior B":[
{name:"Flat Bench Press",sets:2},
{name:"Incline Chest Press",sets:2},
{name:"Decline Bench Press",sets:2},
{name:"Incline Dumbbell Curl",sets:3},
{name:"Preacher Curl",sets:2},
{name:"Hammer Curl",sets:2},
{name:"Shoulder Press",sets:2},
{name:"Lateral Raises",sets:2},
{name:"Leg Extension",sets:3},
{name:"Adductor Machine",sets:2}
],

"Anterior B":[
{name:"T-Bar Row",sets:2},
{name:"Lat Pulldown",sets:2},
{name:"Straight Arm Pulldown",sets:2},
{name:"Rear Delt Fly",sets:3},
{name:"Overhead Triceps Extension",sets:3},
{name:"Triceps Pushdown",sets:2},
{name:"Single Arm Cable Pushdown",sets:2},
{name:"Leg Press",sets:3},
{name:"Standing Calf Raise",sets:3},
{name:"Back Extension",sets:2}
]
};

/* ===================== DASHBOARD ===================== */

function loadDashboard(){
    let grid=document.getElementById("splitGrid");
    grid.innerHTML="";
    Object.keys(program).forEach(day=>{
        let card=document.createElement("div");
        card.className="card";
        card.innerHTML=`<h3>${day}</h3>`;
        card.onclick=()=>startWorkout(day);
        grid.appendChild(card);
    });
}

loadDashboard();

/* ===================== WORKOUT ===================== */

let timer=0;
let interval;
let currentWorkout=[];

function startWorkout(day){
    document.getElementById("dashboard").style.display="none";
    document.getElementById("workoutPage").style.display="block";
    document.getElementById("workoutTitle").innerText=day;

    currentWorkout=[];
    let container=document.getElementById("exerciseContainer");
    container.innerHTML="";

    program[day].forEach((ex,i)=>{
        let div=document.createElement("div");
        div.className="exercise";

        let setsHTML="";
        for(let s=0;s<ex.sets;s++){
            setsHTML+=`
            <div class="set-row">
                <input type="number" placeholder="kg" id="w-${i}-${s}">
                <input type="number" placeholder="reps" id="r-${i}-${s}">
            </div>`;
        }

        div.innerHTML=`
        <h4>${ex.name}</h4>
        ${setsHTML}
        `;

        container.appendChild(div);
    });

    timer=0;
    document.getElementById("time").innerText=0;
    clearInterval(interval);
    interval=setInterval(()=>{
        timer++;
        document.getElementById("time").innerText=timer;
    },1000);
}

/* ===================== FINISH ===================== */

function finishWorkout(){
    clearInterval(interval);

    let data=[];
    let exercises=document.querySelectorAll(".exercise");

    exercises.forEach((ex,i)=>{
        let sets=[];
        let inputs=ex.querySelectorAll("input");
        for(let j=0;j<inputs.length;j+=2){
            let w=inputs[j].value||0;
            let r=inputs[j+1].value||0;
            sets.push({w,r});
        }
        data.push({name:program[document.getElementById("workoutTitle").innerText][i].name,sets});
    });

    let history=JSON.parse(localStorage.getItem("history")||"[]");
    history.push({date:new Date().toLocaleString(),data});
    localStorage.setItem("history",JSON.stringify(history));

    updatePR(data);

    alert("Workout Saved");

    showDashboard();
}

/* ===================== PR SYSTEM ===================== */

function updatePR(data){
    let pr=JSON.parse(localStorage.getItem("pr")||"{}");

    data.forEach(ex=>{
        ex.sets.forEach(set=>{
            let volume=set.w*set.r;
            if(!pr[ex.name]||volume>pr[ex.name]){
                pr[ex.name]=volume;
            }
        });
    });

    localStorage.setItem("pr",JSON.stringify(pr));
}

function showPR(){
    hideAll();
    document.getElementById("prPage").style.display="block";

    let pr=JSON.parse(localStorage.getItem("pr")||"{}");
    let list=document.getElementById("prList");
    list.innerHTML="";

    Object.keys(pr).forEach(k=>{
        let div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<h4>${k}</h4><p>Best Volume: ${pr[k]}</p>`;
        list.appendChild(div);
    });
}

/* ===================== HISTORY ===================== */

function showHistory(){
    hideAll();
    document.getElementById("historyPage").style.display="block";

    let history=JSON.parse(localStorage.getItem("history")||"[]");
    let list=document.getElementById("historyList");
    list.innerHTML="";

    history.reverse().forEach(h=>{
        let div=document.createElement("div");
        div.className="card";

        let inner=`<h4>${h.date}</h4>`;
        h.data.forEach(ex=>{
            inner+=`<p>${ex.name}</p>`;
        });

        div.innerHTML=inner;
        list.appendChild(div);
    });
}

/* ===================== NAVIGATION ===================== */

function hideAll(){
    document.getElementById("dashboard").style.display="none";
    document.getElementById("workoutPage").style.display="none";
    document.getElementById("historyPage").style.display="none";
    document.getElementById("prPage").style.display="none";
}

function showDashboard(){
    hideAll();
    document.getElementById("dashboard").style.display="block";
}

/* ===================== INIT ===================== */

showDashboard();

</script>

</body>
</html>
