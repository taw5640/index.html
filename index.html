<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYAD HYPERTROPHY SYSTEM | ULTIMATE EDITION</title>
    <style>
        :root {
            --bg-deep: #050505;
            --bg-card: rgba(20, 20, 20, 0.8);
            --accent-blue: #00f2ff;
            --accent-violet: #7000ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--accent-violet); border-radius: 10px; }

        /* --- Loading Screen --- */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .logo-container {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 10px var(--accent-blue)); }
            50% { opacity: 0.5; filter: drop-shadow(0 0 2px var(--accent-violet)); }
        }

        /* --- Layout --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        header {
            padding: 40px 0;
            text-align: center;
        }

        header h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-dim);
        }

        /* --- Glassmorphism Cards --- */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .glass-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-5px);
        }

        /* --- Dashboard Grid --- */
        .grid-split {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .workout-card {
            cursor: pointer;
            position: relative;
            overflow: hidden;
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .workout-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(112, 0, 255, 0.4));
            z-index: 0;
        }

        .workout-card h3 { z-index: 1; font-size: 1.5rem; margin-bottom: 5px; }
        .workout-card p { z-index: 1; color: var(--text-dim); font-size: 0.9rem; }

        /* --- Session Mode --- */
        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: sticky;
            top: 10px;
            z-index: 100;
            background: rgba(5, 5, 5, 0.8);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .timer { font-family: monospace; font-size: 1.5rem; color: var(--accent-blue); }

        .exercise-block {
            margin-bottom: 30px;
            border-left: 4px solid var(--accent-violet);
            padding-left: 20px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 0.5fr 1fr 1fr 1fr;
            gap: 15px;
            align-items: center;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 10px;
        }

        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 5px;
            width: 100%;
            text-align: center;
            outline: none;
        }

        input:focus { border-color: var(--accent-blue); }

        .last-perf { font-size: 0.75rem; color: var(--text-dim); }

        /* --- Buttons --- */
        .btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            filter: brightness(1.2);
            box-shadow: var(--neon-shadow);
            transform: scale(1.05);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        /* --- Analytics & Indicators --- */
        .stats-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--accent-blue);
            width: 0%;
            transition: width 1s ease-out;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            gap: 40px;
            z-index: 1000;
        }

        nav i {
            font-size: 1.5rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
        }

        nav i.active { color: var(--accent-blue); text-shadow: 0 0 10px var(--accent-blue); }

        /* --- Hidden Utils --- */
        .hidden { display: none !important; }
        .page-fade { animation: fadeIn 0.5s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PR Alert --- */
        .pr-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: gold;
            color: black;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 800;
            z-index: 2000;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="logo-container">EYAD</div>
        <p style="color: var(--accent-blue); letter-spacing: 2px;">HYPERTROPHY SYSTEM</p>
    </div>

    <nav>
        <div onclick="showPage('dashboard')"><span id="nav-dash" class="nav-icon active">🏠</span></div>
        <div onclick="showPage('history')"><span id="nav-hist" class="nav-icon">📜</span></div>
        <div onclick="showPage('analytics')"><span id="nav-anal" class="nav-icon">📊</span></div>
    </nav>

    <div class="container">
        <header>
            <h1 id="page-title">Training Dashboard</h1>
            <div id="recovery-status" style="margin-top: 10px; font-size: 0.8rem;"></div>
        </header>

        <main id="dashboard-page" class="page-fade">
            <div class="glass-card">
                <h2>Welcome Back, Eyad</h2>
                <p style="color: var(--text-dim); margin-top: 5px;">Ready to break some limits today?</p>
                <div class="stats-bar"><div id="weekly-progress" class="bar-fill"></div></div>
                <p id="weekly-vol-text" style="font-size: 0.7rem; margin-top: 5px;">Weekly Volume Target: 0%</p>
            </div>

            <div class="grid-split" id="workout-grid">
                </div>
        </main>

        <main id="session-page" class="hidden page-fade">
            <div class="session-header">
                <div>
                    <h2 id="current-workout-name">Workout</h2>
                    <div class="timer" id="session-timer">00:00:00</div>
                </div>
                <button class="btn" onclick="finishWorkout()">Finish Session</button>
            </div>
            <div id="exercise-list">
                </div>
        </main>

        <main id="history-page" class="hidden page-fade">
            <h2>Workout Log</h2>
            <div id="history-list" style="margin-top: 20px;">
                </div>
        </main>

        <main id="analytics-page" class="hidden page-fade">
            <div class="glass-card">
                <h2>Personal Records</h2>
                <div id="pr-list" style="margin-top: 15px;">
                    </div>
            </div>
            <div class="glass-card">
                <h2>Protein Synthesis Indicator</h2>
                <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px;">Estimated muscle recovery status based on training frequency.</p>
                <div id="muscle-recovery-grid">
                    </div>
            </div>
        </main>
    </div>

    <script>
        /* --- CORE DATA STRUCTURE --- */
        const WORKOUT_DATA = {
            "Posterior A": [
                { name: "Incline Barbell Bench Press", sets: 2, muscle: "Chest" },
                { name: "Flat Dumbbell Bench Press", sets: 2, muscle: "Chest" },
                { name: "Decline Hammer Strength Press", sets: 2, muscle: "Chest" },
                { name: "Seated Dumbbell Shoulder Press", sets: 2, muscle: "Shoulders" },
                { name: "Dumbbell Lateral Raises", sets: 2, muscle: "Shoulders" },
                { name: "Incline Dumbbell Curls", sets: 3, muscle: "Biceps" },
                { name: "EZ-Bar Preacher Curls", sets: 2, muscle: "Biceps" },
                { name: "Dumbbell Hammer Curls", sets: 2, muscle: "Biceps" },
                { name: "Leg Extensions", sets: 3, muscle: "Quads" },
                { name: "Machine Hip Adduction", sets: 2, muscle: "Adductors" }
            ],
            "Anterior A": [
                { name: "Chest-Supported T-Bar Row", sets: 2, muscle: "Back" },
                { name: "Wide Grip Lat Pulldown", sets: 2, muscle: "Back" },
                { name: "Straight Arm Lat Pullover", sets: 2, muscle: "Back" },
                { name: "Reverse Pec Deck Fly", sets: 3, muscle: "Shoulders" },
                { name: "Cable Overhead Triceps Extension", sets: 3, muscle: "Triceps" },
                { name: "Cable Triceps Pushdown", sets: 2, muscle: "Triceps" },
                { name: "Unilateral Cable Pushdown", sets: 2, muscle: "Triceps" },
                { name: "45-Degree Leg Press", sets: 3, muscle: "Quads" },
                { name: "Standing Calf Raises", sets: 3, muscle: "Calves" },
                { name: "Weighted Hyperextensions", sets: 2, muscle: "Back" }
            ],
            "Posterior B": [
                { name: "Flat Barbell Bench Press", sets: 2, muscle: "Chest" },
                { name: "Incline Dumbbell Bench Press", sets: 2, muscle: "Chest" },
                { name: "Decline Machine Press", sets: 2, muscle: "Chest" },
                { name: "Incline Dumbbell Curls", sets: 3, muscle: "Biceps" },
                { name: "EZ-Bar Preacher Curls", sets: 2, muscle: "Biceps" },
                { name: "Dumbbell Hammer Curls", sets: 2, muscle: "Biceps" },
                { name: "Overhead Press", sets: 2, muscle: "Shoulders" },
                { name: "Dumbbell Lateral Raises", sets: 2, muscle: "Shoulders" },
                { name: "Leg Extensions", sets: 3, muscle: "Quads" },
                { name: "Machine Hip Adduction", sets: 2, muscle: "Adductors" }
            ],
            "Anterior B": [
                { name: "Chest-Supported T-Bar Row", sets: 2, muscle: "Back" },
                { name: "Wide Grip Lat Pulldown", sets: 2, muscle: "Back" },
                { name: "Straight Arm Lat Pullover", sets: 2, muscle: "Back" },
                { name: "Reverse Pec Deck Fly", sets: 3, muscle: "Shoulders" },
                { name: "Cable Overhead Triceps Extension", sets: 3, muscle: "Triceps" },
                { name: "Cable Triceps Pushdown", sets: 2, muscle: "Triceps" },
                { name: "Unilateral Cable Pushdown", sets: 2, muscle: "Triceps" },
                { name: "45-Degree Leg Press", sets: 3, muscle: "Quads" },
                { name: "Standing Calf Raises", sets: 3, muscle: "Calves" },
                { name: "Weighted Hyperextensions", sets: 2, muscle: "Back" }
            ]
        };

        let appState = {
            currentWorkout: null,
            timerInterval: null,
            secondsElapsed: 0,
            history: JSON.parse(localStorage.getItem('eyad_history')) || [],
            prs: JSON.parse(localStorage.getItem('eyad_prs')) || {}
        };

        /* --- INITIALIZATION --- */
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 1000);
            }, 2000);

            renderDashboard();
            updateGlobalStats();
        };

        /* --- ROUTING --- */
        function showPage(pageId) {
            document.querySelectorAll('main').forEach(p => p.classList.add('hidden'));
            document.getElementById(`${pageId}-page`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            if(pageId === 'dashboard') document.getElementById('nav-dash').classList.add('active');
            if(pageId === 'history') { document.getElementById('nav-hist').classList.add('active'); renderHistory(); }
            if(pageId === 'analytics') { document.getElementById('nav-anal').classList.add('active'); renderAnalytics(); }

            document.getElementById('page-title').innerText = pageId.charAt(0).toUpperCase() + pageId.slice(1);
        }

        /* --- DASHBOARD LOGIC --- */
        function renderDashboard() {
            const grid = document.getElementById('workout-grid');
            grid.innerHTML = '';
            
            Object.keys(WORKOUT_DATA).forEach(key => {
                const card = document.createElement('div');
                card.className = 'glass-card workout-card';
                card.innerHTML = `
                    <h3>${key}</h3>
                    <p>${WORKOUT_DATA[key].length} Scientific Movements</p>
                    <button class="btn" style="margin-top:15px" onclick="startWorkout('${key}')">Start Session</button>
                `;
                grid.appendChild(card);
            });
        }

        /* --- WORKOUT SESSION LOGIC --- */
        function startWorkout(workoutKey) {
            appState.currentWorkout = workoutKey;
            appState.secondsElapsed = 0;
            showPage('session');
            document.getElementById('current-workout-name').innerText = workoutKey;
            
            const list = document.getElementById('exercise-list');
            list.innerHTML = '';

            WORKOUT_DATA[workoutKey].forEach((ex, exIdx) => {
                const exBlock = document.createElement('div');
                exBlock.className = 'exercise-block glass-card';
                
                let setsHtml = '';
                for(let i=1; i<=ex.sets; i++) {
                    const lastPerf = getPrevPerformance(ex.name, i);
                    setsHtml += `
                        <div class="set-row">
                            <span style="font-weight:bold">S${i}</span>
                            <div class="input-group">
                                <input type="number" placeholder="kg" class="weight-input" data-ex="${exIdx}" data-set="${i}">
                                <div class="last-perf">Prev: ${lastPerf.w}kg</div>
                            </div>
                            <div class="input-group">
                                <input type="number" placeholder="reps" class="reps-input" data-ex="${exIdx}" data-set="${i}">
                                <div class="last-perf">Prev: ${lastPerf.r} reps</div>
                            </div>
                            <div class="smart-suggest" style="font-size:0.6rem; color:var(--accent-blue)">
                                ${lastPerf.w > 0 ? 'Target: '+(parseFloat(lastPerf.w)+1.25)+'kg' : 'Initial Set'}
                            </div>
                        </div>
                    `;
                }

                exBlock.innerHTML = `
                    <h3>${ex.name}</h3>
                    <p style="color:var(--text-dim); font-size:0.8rem">${ex.muscle} Focus</p>
                    ${setsHtml}
                `;
                list.appendChild(exBlock);
            });

            startTimer();
        }

        function startTimer() {
            if(appState.timerInterval) clearInterval(appState.timerInterval);
            appState.timerInterval = setInterval(() => {
                appState.secondsElapsed++;
                const hrs = Math.floor(appState.secondsElapsed / 3600).toString().padStart(2, '0');
                const mins = Math.floor((appState.secondsElapsed % 3600) / 60).toString().padStart(2, '0');
                const secs = (appState.secondsElapsed % 60).toString().padStart(2, '0');
                document.getElementById('session-timer').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        }

        function finishWorkout() {
            clearInterval(appState.timerInterval);
            
            const sessionResult = {
                id: Date.now(),
                name: appState.currentWorkout,
                duration: document.getElementById('session-timer').innerText,
                date: new Date().toLocaleDateString(),
                exercises: []
            };

            let totalVolume = 0;
            const exBlocks = document.querySelectorAll('.exercise-block');
            
            exBlocks.forEach((block, idx) => {
                const exName = block.querySelector('h3').innerText;
                const weightInputs = block.querySelectorAll('.weight-input');
                const repInputs = block.querySelectorAll('.reps-input');
                
                let exVolume = 0;
                let setsData = [];

                weightInputs.forEach((input, sIdx) => {
                    const w = parseFloat(input.value) || 0;
                    const r = parseInt(repInputs[sIdx].value) || 0;
                    exVolume += (w * r);
                    setsData.push({ set: sIdx+1, weight: w, reps: r });
                    
                    // Check PRs
                    if(w > (appState.prs[exName]?.weight || 0)) {
                        appState.prs[exName] = { weight: w, date: sessionResult.date };
                        triggerPRToast(`NEW MAX: ${w}kg on ${exName}!`);
                    }
                });

                totalVolume += exVolume;
                sessionResult.exercises.push({ name: exName, volume: exVolume, sets: setsData });
            });

            sessionResult.totalVolume = totalVolume;
            appState.history.unshift(sessionResult);
            localStorage.setItem('eyad_history', JSON.stringify(appState.history));
            localStorage.setItem('eyad_prs', JSON.stringify(appState.prs));
            
            updateGlobalStats();
            showPage('dashboard');
        }

        /* --- ANALYTICS & LOGIC --- */
        function getPrevPerformance(exName, setNum) {
            for(let session of appState.history) {
                const ex = session.exercises.find(e => e.name === exName);
                if(ex && ex.sets[setNum-1]) {
                    return { w: ex.sets[setNum-1].weight, r: ex.sets[setNum-1].reps };
                }
            }
            return { w: 0, r: 0 };
        }

        function updateGlobalStats() {
            const progress = document.getElementById('weekly-progress');
            const volText = document.getElementById('weekly-vol-text');
            
            // Calculate weekly volume (last 7 days)
            const weekAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
            const weeklyVol = appState.history
                .filter(s => s.id > weekAgo)
                .reduce((acc, curr) => acc + curr.totalVolume, 0);

            const target = 50000; // Hypothetical 50k kg weekly target
            const percent = Math.min((weeklyVol / target) * 100, 100);
            
            progress.style.width = percent + '%';
            volText.innerText = `Weekly Volume: ${weeklyVol.toLocaleString()}kg / ${target.toLocaleString()}kg (${Math.round(percent)}%)`;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            appState.history.forEach(session => {
                const item = document.createElement('div');
                item.className = 'glass-card page-fade';
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <strong>${session.name}</strong>
                        <span style="color:var(--accent-blue)">${session.date}</span>
                    </div>
                    <p style="font-size:0.8rem; color:var(--text-dim); margin:10px 0">Volume: ${session.totalVolume}kg | Time: ${session.duration}</p>
                    <details>
                        <summary style="cursor:pointer; font-size:0.8rem">View Details</summary>
                        <div style="margin-top:10px; border-top:1px solid var(--glass-border); padding-top:10px">
                            ${session.exercises.map(ex => `
                                <div style="font-size:0.75rem; margin-bottom:5px">
                                    ${ex.name}: ${ex.sets.map(s => `${s.weight}x${s.reps}`).join(' | ')}
                                </div>
                            `).join('')}
                        </div>
                    </details>
                `;
                list.appendChild(item);
            });
        }

        function renderAnalytics() {
            const prList = document.getElementById('pr-list');
            prList.innerHTML = '';
            Object.keys(appState.prs).forEach(name => {
                const div = document.createElement('div');
                div.style = "display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--glass-border)";
                div.innerHTML = `<span>${name}</span> <span style="color:gold">${appState.prs[name].weight}kg</span>`;
                prList.appendChild(div);
            });

            const recoveryGrid = document.getElementById('muscle-recovery-grid');
            recoveryGrid.innerHTML = '';
            const muscles = ["Chest", "Back", "Shoulders", "Quads", "Biceps", "Triceps"];
            
            muscles.forEach(m => {
                const lastTrained = findLastTrained(m);
                const hoursSince = lastTrained ? (Date.now() - lastTrained) / 3600000 : 96;
                const recoveryPct = Math.min((hoursSince / 48) * 100, 100);
                
                const item = document.createElement('div');
                item.style.marginBottom = "15px";
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem">
                        <span>${m} Synthesis</span>
                        <span>${Math.round(recoveryPct)}% Recovered</span>
                    </div>
                    <div class="stats-bar"><div class="bar-fill" style="width:${recoveryPct}%; background:${recoveryPct < 100 ? 'var(--accent-violet)' : 'var(--accent-blue)'}"></div></div>
                `;
                recoveryGrid.appendChild(item);
            });
        }

        function findLastTrained(muscle) {
            for(let session of appState.history) {
                const found = session.exercises.some(ex => {
                    const template = Object.values(WORKOUT_DATA).flat().find(t => t.name === ex.name);
                    return template && template.muscle === muscle;
                });
                if(found) return session.id;
            }
            return null;
        }

        function triggerPRToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'pr-toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

    </script>
</body>
</html>
