<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMastery Academy | الأكاديمية الاحترافية المفتوحة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #06080F;
            --bg-secondary: #0D111C;
            --bg-glass: rgba(13, 17, 28, 0.8);
            --accent-glow: rgba(0, 242, 254, 0.2);
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent-cyan: #00F2FE;
            --accent-purple: #9B51E0;
            --accent-green: #00FF87;
            --border-color: rgba(255, 255, 255, 0.05);
            --card-gradient: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Outfit', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        /* تأثيرات الخلفية المتحركة المريحة */
        .bg-blobs {
            position: fixed;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            top: 0;
            left: 0;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: floating 12s infinite alternate ease-in-out;
        }

        .blob-1 { width: 600px; height: 600px; background: var(--accent-cyan); top: -200px; left: -200px; }
        .blob-2 { width: 700px; height: 700px; background: var(--accent-purple); bottom: -200px; right: -200px; animation-delay: -6s; }

        @keyframes floating {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 80px) scale(1.05); }
        }

        /* شريط التنقل الجانبي - Sidebar */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            border-left: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem 1.5rem;
            z-index: 100;
            box-shadow: -10px 0 30px rgba(0,0,0,0.6);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }

        .logo-area i { color: var(--accent-cyan); text-shadow: 0 0 15px var(--accent-cyan); }

        .nav-links { list-style: none; margin-top: 2rem; flex-grow: 1; }
        .nav-links li { margin-bottom: 0.75rem; }
        .nav-links a {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.9rem 1.2rem;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            font-size: 0.95rem;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            border-right: 4px solid var(--accent-cyan);
            box-shadow: inset 15px 0 20px rgba(0, 242, 254, 0.03);
        }

        .progress-box {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 1.2rem;
            margin-top: auto;
        }

        .bar-container { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 0.5rem; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan)); width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        /* المحتوى الأساسي - البانورامي فائق الاتساع (تم إلغاء القيود) */
        .main-content {
            margin-right: 280px;
            flex-grow: 1;
            padding: 3rem 4rem; /* مساحات تنفس واسعة */
            width: calc(100vw - 280px);
            min-height: 100vh;
        }

        header.top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        .welcome-text h1 { font-size: 2.8rem; font-weight: 900; background: linear-gradient(to left, #fff, var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome-text p { color: var(--text-muted); margin-top: 8px; font-size: 1.1rem; }

        /* شبكة الكورسات العريضة والعملاقة */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); /* كروت أكبر */
            gap: 2.5rem;
            margin-bottom: 5rem;
        }

        .module-card {
            background: var(--card-gradient);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .module-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 242, 254, 0.25);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 30px var(--accent-glow);
        }

        .module-icon {
            width: 65px; height: 65px;
            background: rgba(255,255,255,0.02);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: var(--accent-cyan);
            border: 1px solid var(--border-color);
        }

        .module-info h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.6rem; }
        .module-info p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.7; }

        /* عارض الفيديوهات العملاق (تم تكبيره ليكون سينمائي ومريح) */
        .viewer-container {
            display: grid;
            grid-template-columns: 2.8fr 1.2fr; /* إعطاء مساحة أكبر جداً للفيديو */
            gap: 2.5rem;
            margin-bottom: 5rem;
            display: none; 
            min-height: 600px;
        }

        .video-box {
            background: #04060a;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .video-box iframe { width: 100%; height: 100%; border: none; }

        .content-sidebar {
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            max-height: 650px;
            overflow-y: auto;
        }

        .content-title { font-weight: 800; font-size: 1.3rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; color: var(--accent-cyan); }

        /* سيكشن قائمة الفيديوهات والدروس داخل الموديول */
        .lesson-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lesson-item:hover, .lesson-item.active {
            background: rgba(0, 242, 254, 0.05);
            border-color: var(--accent-cyan);
            transform: translateX(-5px);
        }

        /* سيكشن الكويزات العريض */
        .quiz-section {
            background: var(--card-gradient);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 4rem; /* كبرت الحواف */
            margin-top: 3rem;
            display: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .option-card {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 1.3rem 2rem;
            margin-bottom: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center; gap: 15px;
            font-size: 1.1rem;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: #fff; border: none; padding: 1rem 2.5rem; border-radius: 14px;
            font-weight: 800; cursor: pointer; font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.15);
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 242, 254, 0.3); }

        @media (max-width: 1200px) {
            .viewer-container { grid-template-columns: 1fr; }
            .main-content { padding: 2rem; }
        }
    </style>
</head>
<body>

    <div class="bg-blobs"> <div class="blob blob-1"></div> <div class="blob blob-2"></div> </div>

    <nav class="sidebar">
        <div class="logo-area"> <i class="fa-solid fa-bolt"></i> <span>Titan Academy</span> </div>
        <ul class="nav-links">
            <li><a href="#" class="active" onclick="showSection('home')"><i class="fa-solid fa-house"></i> <span>الرئيسية</span></a></li>
            <li><a href="#" onclick="showSection('recovery')"><i class="fa-solid fa-kit-medical"></i> <span>مختبر الاستشفاء</span></a></li>
            <li><a href="#" onclick="showSection('leaderboard')"><i class="fa-solid fa-trophy"></i> <span>لوحة الشرف</span></a></li>
        </ul>
        <div class="progress-box">
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                <span>مستوى التقدم</span> <span id="progress-percent">0%</span>
            </div>
            <div class="bar-container"> <div class="bar-fill" id="main-progress-bar"></div> </div>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-header">
            <div class="welcome-text">
                <h1>أكاديمية الميكانيكا الحيوية والتشريح</h1>
                <p>تعلم كيف تفكر كخبير، صمم تمارينك بذكاء، وتعافى من الإصابات بأحدث الأساليب العلمية.</p>
            </div>
            <div style="display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.01); padding: 0.7rem 1.2rem; border-radius: 14px; border: 1px solid var(--border-color);">
                <i class="fa-solid fa-circle-user" style="font-size: 1.6rem; color: var(--accent-cyan);"></i>
                <span style="font-weight: 800;">Eyad Hazem</span>
            </div>
        </header>

        <div class="modules-grid" id="modules-container"> </div>
        <div class="viewer-container" id="video-viewer"> </div>
        <div class="quiz-section" id="quiz-container"> </div>
    </main>
        <script>
        // 1. قاعدة البيانات المحدثة 2026 (The Master Database)
        const academyData = {
            modules: [
                {
                    id: 1,
                    title: "Module 1-3: ثورة البيوميكانيكس 2026",
                    description: "الأساسيات العلمية، مستويات الحركة، وكيفية قراءة زوايا المقاومة باستخدام الذكاء الاصطناعي.",
                    icon: "fa-solid fa-microchip",
                    lessons: [
                        { title: "مقدمة في الميكانيكا الحيوية", videoId: "uBGl2BujkPQ", duration: "15 min" },
                        { title: "مستويات الحركة الثلاثة (Planes)", videoId: "pT7yVshU7nU", duration: "20 min" },
                        { title: "تطبيق: كيف تختار الزاوية الأنسب؟", videoId: "l59Z_Z9N0p0", duration: "10 min" }
                    ],
                    quiz: [
                        { question: "في عام 2026، ما هو العامل الأهم لتحديد كفاءة التمرين؟", options: ["الوزن فقط", "اتساق خط المقاومة مع اتجاه الألياف", "عدد العدات", "التعرق"], correct: 1 }
                    ]
                },
                {
                    id: 2,
                    title: "Module 4-6: تشريح الصدر والظهر (الجزء العلوي)",
                    description: "تحليل كامل لألياف الـ Pectoralis و الـ Latissimus dorsi وكيفية عزلها تماماً.",
                    icon: "fa-solid fa-up-long",
                    lessons: [
                        { title: "تشريح الصدر: عزل الألياف العلوية", videoId: "j_N8lqZp7Lw", duration: "25 min" },
                        { title: "الظهر: سر الـ Lat Stretch", videoId: "O94yvZ9__0U", duration: "30 min" },
                        { title: "أخطاء شائعة في تمارين السحب", videoId: "p1_EAnM6IuA", duration: "15 min" }
                    ],
                    quiz: [
                        { question: "أفضل زاوية لاستهداف ألياف الصدر العلوية هي:", options: ["30-45 درجة", "90 درجة", "مستوي تماماً", "لأسفل"], correct: 0 }
                    ]
                },
                {
                    id: 3,
                    title: "Module 7-10: ميكانيكا الأرجل والعمود الفقري",
                    description: "أحدث أبحاث 2026 في تدريب الكوادز والهامسترينج وحماية الفقرات.",
                    icon: "fa-solid fa-down-long",
                    lessons: [
                        { title: "السكوات: علم الثبات والعمق", videoId: "O-L_fM9oPBI", duration: "22 min" },
                        { title: "تشريح الهامسترينج (خلفيات الأرجل)", videoId: "N0mrgQj7Pww", duration: "18 min" }
                    ],
                    quiz: [
                        { question: "ما هي العضلة التي تعمل بكفاءة أكبر في الـ Leg Extension؟", options: ["السمانة", "الـ Rectus Femoris", "الظهر السفلي", "البايسبس"], correct: 1 }
                    ]
                }
            ],
            recoveryLab: [
                {
                    area: "الكتف (Shoulder)",
                    problem: "إصابات الكفة المدورة (Rotator Cuff)",
                    video: "N0mrgQj7Pww",
                    tips: "استخدم ضغط كرة التنس على العضلات الصغيرة تحت لوح الكتف لمدة 60 ثانية."
                },
                {
                    area: "أسفل الظهر (Lower Back)",
                    problem: "آلام الفقرات القطنية",
                    video: "ETo6f6pT9X8",
                    tips: "ركز على إطالة عضلات الهيب فليكسورز (Hip Flexors) لتقليل الضغط على ظهرك."
                }
            ]
        };

        let currentModule = null;
        let activeVideoIndex = 0;

        // 2. دالة بناء الكروت (Home Screen)
        function renderHome() {
            const container = document.getElementById('modules-container');
            container.innerHTML = '';
            document.getElementById('video-viewer').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'none';
            container.style.display = 'grid';

            academyData.modules.forEach((mod, idx) => {
                container.innerHTML += `
                    <div class="module-card" onclick="startModule(${idx})">
                        <div class="module-icon"><i class="${mod.icon}"></i></div>
                        <div class="module-info">
                            <h3>${mod.title}</h3>
                            <p>${mod.description}</p>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; color:var(--accent-cyan); font-weight:bold;">
                            <span>${mod.lessons.length} دروس</span>
                            <i class="fa-solid fa-circle-play"></i>
                        </div>
                    </div>
                `;
            });
        }

        // 3. تشغيل الموديول (Video Player Logic)
        function startModule(idx) {
            currentModule = academyData.modules[idx];
            activeVideoIndex = 0;
            
            document.getElementById('modules-container').style.display = 'none';
            const viewer = document.getElementById('video-viewer');
            viewer.style.display = 'grid';

            renderPlayer();
        }

        function renderPlayer() {
            const lesson = currentModule.lessons[activeVideoIndex];
            const viewer = document.getElementById('video-viewer');
            
            viewer.innerHTML = `
                <div class="video-box">
                    <iframe src="https://www.youtube.com/embed/${lesson.videoId}?rel=0&modestbranding=1&autoplay=1" allowfullscreen></iframe>
                </div>
                <div class="content-sidebar">
                    <div class="content-title">${currentModule.title}</div>
                    <div style="margin-bottom: 1rem; color: var(--text-muted);">الدروس المتسلسلة:</div>
                    <div id="lessons-list">
                        ${currentModule.lessons.map((l, i) => `
                            <div class="lesson-item ${i === activeVideoIndex ? 'active' : ''}" onclick="changeVideo(${i})">
                                <i class="fa-solid ${i === activeVideoIndex ? 'fa-pause' : 'fa-play'}" style="font-size: 0.8rem;"></i>
                                <div style="flex-grow:1">
                                    <div style="font-weight:700; font-size:0.9rem">${l.title}</div>
                                    <div style="font-size:0.75rem; color:var(--text-muted)">${l.duration}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn" style="margin-top:auto" onclick="startQuiz()">دخول اختبار الوحدة 🧠</button>
                    <button class="btn" style="background:rgba(255,255,255,0.05); color:#fff; box-shadow:none" onclick="renderHome()">العودة للرئيسية</button>
                </div>
            `;
        }

        function changeVideo(i) {
            activeVideoIndex = i;
            renderPlayer();
        }

        // 4. نظام الاختبارات المحدث
        function startQuiz() {
            document.getElementById('video-viewer').style.display = 'none';
            const quizBox = document.getElementById('quiz-container');
            quizBox.style.display = 'block';
            
            const q = currentModule.quiz[0]; // نأخذ أول سؤال كمثال
            quizBox.innerHTML = `
                <h2 style="margin-bottom:2rem">اختبار كفاءة الموديول</h2>
                <p style="font-size:1.3rem; margin-bottom:2rem">${q.question}</p>
                ${q.options.map((opt, i) => `
                    <div class="option-card" onclick="checkAnswer(${i}, ${q.correct})">${opt}</div>
                `).join('')}
            `;
        }

        function checkAnswer(selected, correct) {
            if(selected === correct) {
                alert("إجابة عبقرية! لقد أتقنت الميكانيكا الحيوية لهذا الجزء.");
                updateProgress();
                renderHome();
            } else {
                alert("إجابة خاطئة. راجع الفيديو مرة أخرى بتركيز.");
            }
        }

        function updateProgress() {
            let current = parseInt(document.getElementById('progress-percent').innerText);
            current = Math.min(current + 33, 100);
            document.getElementById('progress-percent').innerText = current + "%";
            document.getElementById('main-progress-bar').style.width = current + "%";
        }

        function showSection(name) {
            if(name === 'home') renderHome();
            // يمكن إضافة باقي السكاشن هنا بنفس الطريقة
        }

        // تشغيل الموقع لأول مرة
        window.onload = renderHome;
    </script>
</body>
</html>
