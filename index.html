<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulse AI Alpha | نظام التدريب الذكي</title>
    
    <!-- تحميل المكتبات الأساسية -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        /* التكوين اللوني والأساسي للتطبيق */
        :root {
            --bg: #0a0a0b;
            --surface: #121418;
            --surface-light: #1b1e25;
            --accent: #c9ff45;
            --border: #242831;
            --text-dim: #94bcff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
        }

        /* تنسيق الـ Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* إخفاء أسهم الأرقام */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 110px;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Exercise Database ---
        const EXERCISE_LIBRARY = {
            "الصدر": ["Barbell Bench Press", "Dumbbell Press", "Incline Barbell Press", "Chest Flyes", "Push-ups", "Dips"],
            "الظهر": ["Deadlift", "Barbell Row", "Lat Pulldown", "Pull-ups", "Seated Row", "Face Pulls"],
            "الأكتاف": ["Overhead Press", "Lateral Raises", "Arnold Press", "Front Raises", "Rear Delt Flyes"],
            "الأرجل": ["Squats", "Leg Press", "Leg Extensions", "Leg Curls", "Calf Raises", "Lunges"],
            "الأذرع": ["Bicep Curls", "Hammer Curls", "Tricep Pushdowns", "Skull Crushers", "Dips"]
        };

        const INITIAL_PROGRAM = [
            { key: "day1", dayIndex: 1, name: "صدر وأكتاف", type: "train", focus: "عضلة الصدر العلوية والأكتاف الأمامية", exercises: [{ name: "Barbell Bench Press", sets: 3 }, { name: "Seated Dumbbell Press", sets: 3 }] },
            { key: "day2", dayIndex: 2, name: "راحة إيجابية", type: "rest", focus: "استشفاء وتنظيم طاقة", exercises: [] },
            { key: "day3", dayIndex: 3, name: "ظهر وأرجل", type: "train", focus: "سحب وعضلات الفخذ", exercises: [{ name: "Barbell Row", sets: 3 }, { name: "Squats", sets: 3 }] }
        ];

        // --- Icons Factory (Using Lucide) ---
        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Main Application ---
        function App() {
            const [activeTab, setActiveTab] = useState('hub');
            const [program, setProgram] = useState(INITIAL_PROGRAM);
            const [sessions, setSessions] = useState([]);
            const [prs, setPrs] = useState({});
            const [drafts, setDrafts] = useState({});
            const [isLibOpen, setIsLibOpen] = useState(false);
            const [libTarget, setLibTarget] = useState(null);
            const [search, setSearch] = useState("");
            const [timer, setTimer] = useState({ remain: 120, running: false });

            const today = program[0]; // تبسيط للعرض

            // Logic: Storage
            useEffect(() => {
                const saved = localStorage.getItem("pulse_al_master");
                if (saved) {
                    const d = JSON.parse(saved);
                    if (d.sessions) setSessions(d.sessions);
                    if (d.prs) setPrs(d.prs);
                }
            }, []);

            // Logic: Timer
            useEffect(() => {
                let inter;
                if (timer.running && timer.remain > 0) {
                    inter = setInterval(() => setTimer(t => ({ ...t, remain: t.remain - 1 })), 1000);
                }
                return () => clearInterval(inter);
            }, [timer.running]);

            const finishSession = (draft) => {
                const session = { ...draft, date: new Date().toISOString() };
                setSessions([session, ...sessions]);
                setActiveTab('hub');
                alert("تم لمزامنة الجلسة بنجاح!");
            };

            const renderHub = () => (
                <div className="p-4 space-y-6 pb-28">
                    <header className="flex justify-between items-center">
                        <div>
                            <p className="text-[10px] font-black uppercase text-lime-400 opacity-60">Pulse AI Pro</p>
                            <h1 className="text-2xl font-black text-white">غرفة القيادة</h1>
                        </div>
                        <div className="bg-lime-400 text-black px-3 py-1 rounded-xl font-black text-xs uppercase shadow-lg shadow-lime-400/20">اليوم 01</div>
                    </header>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="metric-card">
                            <span className="text-[9px] font-black uppercase opacity-40">الحجم الكلي</span>
                            <div className="text-2xl font-black text-white">8.4<small className="text-xs">t</small></div>
                            <span className="text-[9px] text-lime-400 uppercase font-black">أداء مرتفع</span>
                        </div>
                        <div className="metric-card">
                            <span className="text-[9px] font-black uppercase opacity-40">الاستشفاء</span>
                            <div className="text-2xl font-black text-white">88%</div>
                            <span className="text-[9px] text-lime-400 uppercase font-black">جاهز للتدريب</span>
                        </div>
                    </div>

                    <div className="bg-[#1b1e25] border border-white/5 rounded-[2.5rem] p-6 relative overflow-hidden shadow-2xl">
                        <div className="absolute top-0 right-0 p-4 opacity-5"><Icon name="zap" className="w-24 h-24" /></div>
                        <h3 className="text-sm font-black text-white/40 mb-2 uppercase">توجيه اليوم</h3>
                        <div className="flex items-end justify-between">
                            <div>
                                <h2 className="text-2xl font-black text-white mb-1">{today.name}</h2>
                                <p className="text-xs text-white/40 max-w-[200px]">{today.focus}</p>
                            </div>
                            <button onClick={() => setActiveTab('work')} className="w-14 h-14 bg-lime-400 rounded-2xl flex items-center justify-center shadow-lg shadow-lime-400/30">
                                <Icon name="play" className="text-black fill-current w-6 h-6" />
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderWorkout = () => (
                <div className="p-4 space-y-4 pb-28">
                    <div className="flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-50 py-2 -mx-4 px-4">
                        <h2 className="text-lg font-black text-white">{today.name}</h2>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setTimer(t => ({...t, running: !t.running}))} className="p-2 bg-[#1b1e25] rounded-xl"><Icon name="timer" className="w-4 h-4 text-lime-400" /></button>
                            <span className="bg-[#1b1e25] px-3 py-1 rounded-xl text-lime-400 font-bold font-mono">{Math.floor(timer.remain/60)}:{(timer.remain%60).toString().padStart(2,'0')}</span>
                        </div>
                    </div>

                    {today.exercises.map((ex, i) => (
                        <div key={i} className="bg-[#121418] border border-white/5 rounded-[2rem] p-4 space-y-4 shadow-xl">
                            <div className="flex justify-between items-center">
                                <h3 className="font-bold text-white text-sm">{ex.name}</h3>
                                <span className="text-[9px] bg-white/5 px-2 py-1 rounded-lg uppercase text-white/40">Unit {i+1}</span>
                            </div>
                            <div className="space-y-2">
                                {[1,2,3].map(setIdx => (
                                    <div key={setIdx} className="grid grid-cols-[24px_1fr_1fr_40px] gap-2 items-center">
                                        <span className="text-[10px] text-white/20 font-black">{setIdx}</span>
                                        <input type="number" placeholder="kg" className="bg-[#1b1e25] block w-full rounded-xl h-10 text-center text-sm font-bold text-white outline-none" />
                                        <input type="number" placeholder="reps" className="bg-[#1b1e25] block w-full rounded-xl h-10 text-center text-sm font-bold text-white outline-none" />
                                        <button className="h-10 w-10 flex items-center justify-center bg-[#1b1e25] rounded-xl border border-white/5 text-white/20 hover:bg-lime-400 hover:text-black transition-all">
                                            <Icon name="check" className="w-4 h-4" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                    <button onClick={finishSession} className="w-full bg-lime-400 text-black py-5 rounded-[2rem] font-black uppercase text-sm shadow-xl shadow-lime-400/20 active:scale-95 transition-all">إنهاء وموثقة التدريب</button>
                </div>
            );

            return (
                <div className="min-h-screen bg-black">
                    <AnimatePresence mode="wait">
                        {activeTab === 'hub' && <motion.div initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} exit={{opacity:0}}>{renderHub()}</motion.div>}
                        {activeTab === 'work' && <motion.div initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} exit={{opacity:0}}>{renderWorkout()}</motion.div>}
                    </AnimatePresence>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[100]">
                        <div className="bg-[#121418]/90 backdrop-blur-2xl border border-white/5 p-2 rounded-[2.5rem] flex justify-between shadow-2xl">
                            <button onClick={() => setActiveTab('hub')} className={`flex-1 flex flex-col items-center gap-1 py-3 rounded-[2rem] transition-all ${activeTab === 'hub' ? 'bg-lime-400 text-black font-black' : 'text-white/40'}`}>
                                <Icon name="layout-dashboard" className="w-5 h-5" /><span className="text-[8px] uppercase font-black">Hub</span>
                            </button>
                            <button onClick={() => setActiveTab('work')} className={`flex-1 flex flex-col items-center gap-1 py-3 rounded-[2rem] transition-all ${activeTab === 'work' ? 'bg-lime-400 text-black font-black' : 'text-white/40'}`}>
                                <Icon name="zap" className="w-5 h-5" /><span className="text-[8px] uppercase font-black">Work</span>
                            </button>
                            <button className="flex-1 flex flex-col items-center gap-1 py-3 rounded-[2rem] text-white/40">
                                <Icon name="bar-chart-3" className="w-5 h-5" /><span className="text-[8px] uppercase font-black">Data</span>
                            </button>
                            <button className="flex-1 flex flex-col items-center gap-1 py-3 rounded-[2rem] text-white/40">
                                <Icon name="settings" className="w-5 h-5" /><span className="text-[8px] uppercase font-black">Conf</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
