<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMastery Academy | أكاديمية الميكانيكا الحيوية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #080B11;
            --bg-secondary: #111622;
            --bg-glass: rgba(17, 22, 34, 0.75);
            --accent-glow: rgba(0, 242, 254, 0.15);
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent-cyan: #00F2FE;
            --accent-purple: #9B51E0;
            --accent-green: #00FF87;
            --border-color: rgba(255, 255, 255, 0.05);
            --card-gradient: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Outfit', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        /* تأثيرات الخلفية المتحركة */
        .bg-blobs {
            position: fixed;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            top: 0;
            left: 0;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            animation: floating 10s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-cyan);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: var(--accent-purple);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes floating {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* شريط التنقل الجانبي - Sidebar */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem 1.5rem;
            z-index: 100;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        .logo-area i {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        .nav-links {
            list-style: none;
            margin-top: 2rem;
            flex-grow: 1;
        }

        .nav-links li {
            margin-bottom: 0.75rem;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-right: 3px solid var(--accent-cyan);
            box-shadow: inset 10px 0 20px rgba(0, 242, 254, 0.05);
        }

        .nav-links a i {
            width: 20px;
            text-align: center;
        }

        /* تتبع مستوى التقدم في السايدبار */
        .progress-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem;
            margin-top: auto;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .bar-container {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
            width: 0%; /* سيتغير بالجافا سكريبت */
            transition: width 0.5s ease;
        }

        /* المحتوى الأساسي - Main Content */
        .main-content {
            margin-right: 280px;
            flex-grow: 1;
            padding: 2rem 3rem;
            width: calc(100vw - 280px);
        }

        header.top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .welcome-text h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(to left, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-text p {
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* كروت الكورس - Course Modules Cards */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .module-card {
            background: var(--card-gradient);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .module-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .module-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 20px var(--accent-glow);
        }

        .module-card * {
            position: relative;
            z-index: 1;
        }

        .module-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent-cyan);
            border: 1px solid var(--border-color);
        }

        .module-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .module-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .module-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .module-footer span i {
            color: var(--accent-cyan);
            margin-left: 5px;
        }

        /* قسم عارض الفيديوهات والمحتوى - Interactive Viewer */
        .viewer-container {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 2rem;
            margin-bottom: 4rem;
            display: none; /* سيظهر عند الضغط على الموديول */
        }

        .video-box {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
            aspect-ratio: 16/9;
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .content-sidebar {
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .content-title {
            font-weight: 700;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
        }

        /* نظام الكويزات التفاعلي - Advanced Quiz System */
        .quiz-section {
            background: var(--card-gradient);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            margin-top: 3rem;
            display: none; /* سيظهر عند الانتهاء من الوحدة */
            position: relative;
        }

        .quiz-header h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        .option-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--accent-cyan);
            transform: translateX(-5px);
        }

        .option-card.selected {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--accent-cyan);
            font-weight: 700;
        }

        .option-card.correct {
            background: rgba(0, 255, 135, 0.1);
            border-color: var(--accent-green);
        }

        .option-card.wrong {
            background: rgba(255, 71, 87, 0.1);
            border-color: #ff4757;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: #fff;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
        }

        /* تصميم الموبايل سريعاً للحفاظ على الاستجابة */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 1.5rem 0.5rem; }
            .logo-area span, .nav-links span, .progress-box { display: none; }
            .main-content { margin-right: 80px; width: calc(100vw - 80px); padding: 1.5rem; }
            .viewer-container { grid-template-columns: 1fr; }
        }
    </style>
</head>

        let currentQuizIndex = 0;
        let selectedOption = null;

        function startQuiz(moduleIndex) {
            currentModuleIndex = moduleIndex;
            const module = academyData.modules[moduleIndex];
            
            // إخفاء عارض الفيديو وإظهار قسم الكويز
            document.getElementById('video-viewer').style.display = 'none';
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.style.display = 'block';

            currentQuizIndex = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const module = academyData.modules[currentModuleIndex];
            const quiz = module.quiz[currentQuizIndex];
            const quizContainer = document.getElementById('quiz-container');
            selectedOption = null;

            quizContainer.innerHTML = `
                <div class="quiz-header">
                    <h2>الاختبار الذكي: ${module.title}</h2>
                    <p style="color: var(--text-muted);">السؤال ${currentQuizIndex + 1} من ${module.quiz.length}</p>
                </div>
                
                <div style="margin: 2rem 0; font-size: 1.2rem; font-weight: bold;">
                    ${quiz.question}
                </div>

                <div class="options-container">
                    ${quiz.options.map((option, index) => `
                        <div class="option-card" id="option-${index}" onclick="selectOption(${index})">
                            <span style="width: 25px; height: 25px; border-radius: 50%; border: 2px solid var(--text-muted); display: inline-flex; align-items: center; justify-content: center; font-size: 0.8rem;">${index + 1}</span>
                            ${option}
                        </div>
                    `).join('')}
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem;">
                    <span style="color: var(--accent-cyan); font-weight: bold;">الدرجة الحالية: ${score}</span>
                    <button class="btn" onclick="submitAnswer()">تأكيد الإجابة</button>
                </div>
            `;
        }

        function selectOption(index) {
            const module = academyData.modules[currentModuleIndex];
            const quiz = module.quiz[currentQuizIndex];
            
            // إزالة الاختيار السابق
            const allOptions = document.querySelectorAll('.option-card');
            allOptions.forEach(opt => opt.classList.remove('selected'));

            // تحديد الخيار الجديد
            const selectedElement = document.getElementById(`option-${index}`);
            selectedElement.classList.add('selected');
            selectedOption = index;
        }

        function submitAnswer() {
            if (selectedOption === null) {
                alert('الرجاء اختيار إجابة أولاً!');
                return;
            }

            const module = academyData.modules[currentModuleIndex];
            const quiz = module.quiz[currentQuizIndex];
            const selectedElement = document.getElementById(`option-${selectedOption}`);

            // التحقق من صحة الإجابة
            if (selectedOption === quiz.correct) {
                selectedElement.classList.remove('selected');
                selectedElement.classList.add('correct');
                score++;
            } else {
                selectedElement.classList.remove('selected');
                selectedElement.classList.add('wrong');
                // إظهار الإجابة الصحيحة
                document.getElementById(`option-${quiz.correct}`).classList.add('correct');
            }

            // الانتظار قليلاً ليرى المستخدم النتيجة ثم الانتقال للسؤال التالي أو إنهاء الكويز
            setTimeout(() => {
                currentQuizIndex++;
                if (currentQuizIndex < module.quiz.length) {
                    loadQuestion();
                } else {
                    showFinalResult();
                }
            }, 1500);
        }

        function showFinalResult() {
            const module = academyData.modules[currentModuleIndex];
            const quizContainer = document.getElementById('quiz-container');

            const passed = score >= passGrade;

            if (passed && !completedModules.includes(module.id)) {
                completedModules.push(module.id);
                updateProgressBar();
            }

            quizContainer.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <div style="font-size: 4rem; color: ${passed ? 'var(--accent-green)' : '#ff4757'}; margin-bottom: 1rem;">

                    </div>
                </div>
            `;
            
            renderModules(); // لتحديث الكروت وإظهار علامة مكتمل
        }

        function updateProgressBar() {
            const totalModules = academyData.modules.length;
            const completedCount = completedModules.length;
            const percent = Math.round((completedCount / totalModules) * 100);

            document.getElementById('main-progress-bar').style.width = `${percent}%`;

        window.openRecoveryVideo = function(url) {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('modalIframe');
            iframe.src = url;
            modal.style.display = 'flex';
        };

        window.closeRecoveryVideo = function() {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('modalIframe');
            iframe.src = ''; // إيقاف الفيديو عند الإغلاق
            modal.style.display = 'none';
        };
                // 11. ربط أزرار السايدبار بالتفاعلات الحركية (Navigation & Animations)
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', function() {
                document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 12. إضافة لوحة الشرف (Leaderboard) لمحاكاة المواقع العالمية
        function renderLeaderboard() {
            const mainContent = document.querySelector('.main-content');
            let leaderboardSection = document.getElementById('dynamic-leaderboard-section');
            if (!leaderboardSection) {
                leaderboardSection = document.createElement('div');
                leaderboardSection.id = 'dynamic-leaderboard-section';
                mainContent.appendChild(leaderboardSection);
            }

            leaderboardSection.style.display = 'block';
            leaderboardSection.innerHTML = `
                <div style="margin-bottom: 2rem; animation: fadeIn 0.5s ease-out;">
                    <h1 style="font-size: 2.2rem; font-weight: 900;">لوحة الشرف (Leaderboard)</h1>
                    <p style="color: var(--text-muted);">الأبطال الذين أتموا الكورس بنسبة نجاح 100%.</p>
                </div>

                <div style="background: var(--card-gradient); border: 1px solid var(--border-color); border-radius: 20px; padding: 2rem; animation: fadeIn 0.5s ease-out 0.2s; animation-fill-mode: both;">
                    <table style="width: 100%; border-collapse: collapse; text-align: right;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--border-color); color: var(--accent-cyan);">
                                <th style="padding: 1rem;">الترتيب</th>
                                <th style="padding: 1rem;">الاسم</th>
                                <th style="padding: 1rem;">النقاط</th>
                                <th style="padding: 1rem;">التقدم</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.02);">
                                <td style="padding: 1rem;"><i class="fa-solid fa-trophy" style="color: #FFD700;"></i> #1</td>
                                <td style="padding: 1rem; font-weight: bold;">أنت (البطل المستقبلي)</td>
                                <td style="padding: 1rem;">1200 xp</td>
                                <td style="padding: 1rem; color: var(--accent-green);">100%</td>
                            </tr>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.02);">
                                <td style="padding: 1rem;"><i class="fa-solid fa-medal" style="color: #C0C0C0;"></i> #2</td>
                                <td style="padding: 1rem;">أحمد علي</td>
                                <td style="padding: 1rem;">1150 xp</td>
                                <td style="padding: 1rem;">95%</td>
                            </tr>
                            <tr>
                                <td style="padding: 1rem;"><i class="fa-solid fa-medal" style="color: #CD7F32;"></i> #3</td>
                                <td style="padding: 1rem;">محمد حسن</td>
                                <td style="padding: 1rem;">900 xp</td>
                                <td style="padding: 1rem;">80%</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
        }

        // 13. إدراج أنيميشن الفتح (Fade-in CSS)
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(15px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .modules-grid, .quiz-section, .viewer-container, #dynamic-recovery-section {
                animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            }
        `;
        document.head.appendChild(style);

        // تعديل أخير على دالة showSection للربط الشامل بين السايدبار والصفحات
        const previousShowSection = showSection;
        showSection = function(sectionName) {
            previousShowSection(sectionName);
            const leaderboard = document.getElementById('dynamic-leaderboard-section');
            if (leaderboard) leaderboard.style.display = 'none';

            if (sectionName === 'leaderboard') {
                document.getElementById('modules-container').style.display = 'none';
                document.getElementById('video-viewer').style.display = 'none';
                document.getElementById('quiz-container').style.display = 'none';
                const recovery = document.getElementById('dynamic-recovery-section');
                if (recovery) recovery.style.display = 'none';
                renderLeaderboard();
            }
        }
    </script>
</body>
</html>
