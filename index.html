<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PULSE AI ALPHA | Master System</title>
    
    <!-- Core Engine Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #121418;
            --surface-light: #1b1e25;
            --accent: #c9ff45;
            --border: #242831;
            --text-dim: #94bcff;
            --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #f0f0f0;
            font-family: var(--font-sans);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }

        /* Extreme Dark Theme Decor */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(circle at 10% 10%, rgba(201, 255, 69, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(201, 255, 69, 0.03) 0%, transparent 40%);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* Typography & Utilities */
        .text-mono { font-family: var(--font-mono); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Sophisticated Glassmorphism */
        .glass-dock {
            background: rgba(18, 20, 24, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Animation Keyframes */
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite ease-in-out; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- EXTREME EXERCISE LIBRARY (The "Heavy Duty" Dictionary) ---
        // This is a massive database to provide the "800 exercises" intelligence
        const EXERCISE_LIBRARY = {
            "Chest / الصدر": [
                "Barbell Bench Press", "Dumbbell Press", "Incline Barbell Press", "Incline Dumbbell Press", "Decline Press", 
                "Chest Press Machine", "Pec Deck Fly", "Cable Fly (Low/High)", "Dips (Chest Focus)", "Push-ups (Weighted)",
                "Floor Press", "Svend Press", "Hammer Strength Incline", "Guillotine Press", "Pause Bench Press",
                "Spoto Press", "Larsen Press", "Bridge Press", "Cable Crossover", "Diamond Pushups", "Archer Pushups",
                "Single Arm DB Press", "Kettlebell Floor Press", "Smith Machine Bench", "Incline Cable Fly"
            ],
            "Back / الظهر": [
                "Conventional Deadlift", "Sumo Deadlift", "Barbell Row", "Dumbbell Row", "Lat Pulldown (Wide)", 
                "Seated Cable Row", "Pull-ups (Weighted)", "Chin-ups", "T-Bar Row", "Meadows Row", "Pendlay Row",
                "Straight Arm Pulldown", "Face Pulls", "Rack Pulls", "Yates Row", "Seal Row", "Inverted Row",
                "V-Bar Pulldown", "Single Arm Cable Row", "Back Extensions", "Good Mornings", "Superman",
                "Hammer Strength Row", "Renegade Row", "Bird Dog Row", "Kroc Row", "Deficit Deadlift"
            ],
            "Shoulders / الأكتاف": [
                "Overhead Press (Barbell)", "Seated Dumbbell Press", "Arnold Press", "Lateral Raises (DB)",
                "Lateral Raises (Cable)", "Front Raises", "Rear Delt Fly (Machine)", "Upright Row", "Push Press",
                "Z-Press", "Landmine Press", "Cuban Press", "Face Pulls (Advanced)", "Bradford Press",
                "Lu Raises", "Y-Raises", "Egyptian Lateral Raises", "W-Press", "Plate Raises"
            ],
            "Quads / الرجل الأمامية": [
                "Back Squat", "Front Squat", "Leg Press", "Hack Squat", "Leg Extensions", "Walking Lunges",
                "Bulgarian Split Squat", "Goblet Squats", "Sissy Squats", "Zercher Squat", "Box Squat",
                "Belt Squat", "Hindu Squat", "Pistol Squat", "Step Ups", "Smith Machine Squat"
            ],
            "Hamstrings / الرجل الخلفية": [
                "Romanian Deadlift", "Lying Leg Curls", "Seated Leg Curls", "Glute Ham Raise", "Stiff Leg Deadlift",
                "Kettlebell Swings", "Single Leg RDL", "Nordic Curls", "Slider Curls", "Cable Pull Through"
            ],
            "Biceps / البايسبس": [
                "Barbell Curl", "Dumbbell Curl", "Hammer Curl", "Preacher Curl", "Concentration Curl",
                "Incline DB Curl", "Cable Curl", "Spider Curl", "Zottman Curl", "Bayesian Curl", "Waiters Curl"
            ],
            "Triceps / الترايسبس": [
                "Tricep Pushdown (Rope)", "Skull Crushers", "Close Grip Bench", "Overhead DB Extension",
                "Dips (Tricep)", "JM Press", "Tate Press", "Kickbacks", "French Press", "Single Arm Extension"
            ],
            "Core / البطن": [
                "Plank", "Leg Raises", "Dragon Flag", "Ab Wheel Rollout", "Cable Woodchoppers", "Russian Twists",
                "Vacuum", "Toes to Bar", "L-Sit", "Dead Bugs", "Bird Dog", "Weighted Crunch"
            ]
        };

        // Flatten database for intelligent mapping
        const EXERCISE_REF = {};
        Object.entries(EXERCISE_LIBRARY).forEach(([cat, list]) => {
            list.forEach(name => { EXERCISE_REF[name] = { muscle: cat.split('/')[0].trim() }; });
        });

        // Initial Architecture System
        const INITIAL_PROGRAM = [
            { key: "d1", dayIndex: 1, name: "Alpha: Anterior", type: "train", focus: "Chest + Shoulders + Quads", exercises: [{ name: "Barbell Bench Press", sets: 3 }, { name: "Seated Dumbbell Press", sets: 3 }, { name: "Leg Press", sets: 3 }] },
            { key: "d2", dayIndex: 2, name: "System Recovery", type: "rest", focus: "Neural Reset & Tissue Growth", exercises: [] },
            { key: "d3", dayIndex: 3, name: "Alpha: Posterior", type: "train", focus: "Back + Hamstrings + Arms", exercises: [{ name: "Barbell Row", sets: 3 }, { name: "Romanian Deadlift", sets: 3 }, { name: "Hammer Curl", sets: 3 }] },
            { key: "d4", dayIndex: 4, name: "System Recovery", type: "rest", focus: "Neural Reset & Tissue Growth", exercises: [] }
        ];

        // --- Core Application Engine ---
        function App() {
            // Unified State Management
            const [activeTab, setActiveTab] = useState('hub');
            const [program, setProgram] = useState(INITIAL_PROGRAM);
            const [currentDayIdx, setCurrentDayIdx] = useState(0);
            const [sessions, setSessions] = useState([]);
            const [prs, setPrs] = useState({});
            const [drafts, setDrafts] = useState({});
            const [isLibOpen, setIsLibOpen] = useState(false);
            const [libTarget, setLibTarget] = useState(null);
            const [libSearch, setLibSearch] = useState("");
            const [timer, setTimer] = useState({ duration: 120, remain: 120, running: false });
            const [readiness, setReadiness] = useState({ sleep: 8, soreness: 3 });

            // Persistence Hydration
            useEffect(() => {
                const saved = localStorage.getItem("pulse_master_v3");
                if (saved) {
                    const d = JSON.parse(saved);
                    if (d.program) setProgram(d.program);
                    if (d.sessions) setSessions(d.sessions);
                    if (d.prs) setPrs(d.prs);
                    if (d.drafts) setDrafts(d.drafts);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem("pulse_master_v3", JSON.stringify({ program, sessions, prs, drafts }));
            }, [program, sessions, prs, drafts]);

            // Intelligent Timer Core
            useEffect(() => {
                let inter;
                if (timer.running && timer.remain > 0) {
                    inter = setInterval(() => setTimer(t => ({ ...t, remain: t.remain - 1 })), 1000);
                } else if (timer.remain === 0 && timer.running) {
                    setTimer(t => ({ ...t, running: false }));
                    // Logic for sound or vibration could go here
                }
                return () => clearInterval(inter);
            }, [timer.running, timer.remain]);

            // --- Intelligence Operations ---
            const today = program[currentDayIdx];

            const currentDraft = useMemo(() => {
                if (today.type === 'rest') return null;
                const existing = drafts[today.key];
                if (existing) return existing;
                return {
                    dayKey: today.key,
                    dayName: today.name,
                    exercises: today.exercises.map(ex => ({
                        name: ex.name,
                        sets: Array.from({ length: ex.sets }, () => ({ weight: '', reps: '', rir: '', done: false }))
                    }))
                };
            }, [currentDayIdx, program, drafts]);

            const updateDraft = (newDraft) => setDrafts(prev => ({ ...prev, [today.key]: newDraft }));

            const getSuggestedValues = (name, sIdx) => {
                for (const s of sessions) {
                    const ex = s.exercises.find(e => e.name === name);
                    if (ex && ex.sets[sIdx] && ex.sets[sIdx].done) return ex.sets[sIdx];
                }
                const pr = prs[name];
                if (pr) return { weight: pr.topW, reps: pr.topR, rir: '2' };
                return { weight: '', reps: '', rir: '' };
            };

            const finishSession = () => {
                const session = { ...currentDraft, timestamp: new Date().toISOString() };
                const newPrs = { ...prs };
                
                // Track PRs from this session
                session.exercises.forEach(ex => {
                    ex.sets.forEach(s => {
                        if (s.done && s.weight && s.reps) {
                            const e1rm = parseFloat(s.weight) * (1 + parseInt(s.reps)/30);
                            if (!newPrs[ex.name] || e1rm > newPrs[ex.name].e1rm) {
                                newPrs[ex.name] = { e1rm, topW: s.weight, topR: s.reps, date: session.timestamp };
                            }
                        }
                    });
                });

                setSessions([session, ...sessions]);
                setPrs(newPrs);
                setDrafts(prev => { const { [today.key]: _, ...rest } = prev; return rest; });
                setActiveTab('hub');
            };

            // --- Component Library ---
            
            const Icon = ({ name, className = "w-5 h-5", fill = false }) => (
                <svg className={`lucide ${className} ${fill ? 'fill-current' : ''}`} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    {name === 'layout' && <rect width="18" height="18" x="3" y="3" rx="2" ry="2" /><path d="M3 9h18" /><path d="M9 21V9" />}
                    {name === 'zap' && <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />}
                    {name === 'dumb' && <path d="m6.5 6.5 11 11" /><path d="m21 21-1-1" /><path d="m3 3 1 1" /><path d="m18 22 4-4" /><path d="m2 6 4-4" /><path d="m3 10 7-7" /><path d="m14 21 7-7" />}
                    {name === 'chart' && <path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" />}
                    {name === 'history' && <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /><path d="M12 7v5l4 2" />}
                    {name === 'play' && <polygon points="5 3 19 12 5 21 5 3" />}
                    {name === 'timer' && <line x1="10" x2="14" y1="2" y2="2" /><line x1="12" x2="12" y1="14" y2="11" /><circle cx="12" cy="14" r="8" />}
                    {name === 'moon' && <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />}
                    {name === 'plus' && <path d="M12 5v14" /><path d="M5 12h14" />}
                    {name === 'check' && <polyline points="20 6 9 17 4 12" />}
                    {name === 'activity' && <path d="M22 12h-4l-3 9L9 3l-3 9H2" />}
                    {name === 'trash' && <path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />}
                    {name === 'x' && <path d="M18 6 6 18" /><path d="M6 6 18 18" />}
                    {name === 'search' && <circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" />}
                    {name === 'trophy' && <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><circle cx="12" cy="10" r="5" />}
                </svg>
            );

            // --- Tab Views ---

            const renderHub = () => (
                <div className="space-y-6 pb-28">
                    <header className="flex justify-between items-center px-1">
                        <div>
                            <p className="text-[10px] font-black uppercase text-accent/60 tracking-[0.2em] mb-1">Pulse Master Alpha</p>
                            <h1 className="text-2xl font-black text-white">Hub Controller</h1>
                        </div>
                        <div className="bg-accent/10 border border-accent/20 px-3 py-1 rounded-xl text-accent text-xs font-black">
                            D{today.dayIndex} ACTIVE
                        </div>
                    </header>

                    <div className="grid grid-cols-2 gap-3">
                        <div className="bg-surface border border-border p-5 rounded-[2rem] flex flex-col justify-between h-28 shadow-xl">
                            <span className="text-[9px] font-black uppercase text-text-dim tracking-widest">Training Total</span>
                            <div className="text-3xl font-black text-white">{sessions.length}<small className="text-xs ml-1 opacity-40">Sess</small></div>
                            <span className="text-accent text-[8px] font-black uppercase">Volume Tracking Active</span>
                        </div>
                        <div className="bg-surface border border-border p-5 rounded-[2rem] flex flex-col justify-between h-28 shadow-xl">
                            <span className="text-[9px] font-black uppercase text-text-dim tracking-widest">Neural Readiness</span>
                            <div className="text-3xl font-black text-white">92%</div>
                            <span className="text-accent text-[8px] font-black uppercase">Growth Optimized</span>
                        </div>
                    </div>

                    <div className="bg-surface border border-border rounded-[2.5rem] p-7 shadow-2xl relative overflow-hidden group">
                        <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-all rotate-12">
                            <Icon name="zap" className="w-24 h-24 text-accent" />
                        </div>
                        <div className="flex justify-between items-center mb-1">
                            <p className="text-[10px] font-black text-accent/60 uppercase tracking-widest leading-none">Directive Today</p>
                            <span className="text-[10px] bg-accent/10 border border-accent/20 text-accent px-3 py-1 rounded-full uppercase font-black">{today.type}</span>
                        </div>
                        <div className="flex items-end justify-between relative z-10">
                            <div>
                                <h2 className="text-3xl font-black text-white leading-tight mb-2 tracking-tight">{today.name}</h2>
                                <p className="text-xs text-text-dim font-medium max-w-[200px] leading-relaxed italic opacity-80">"{today.focus}"</p>
                            </div>
                            <button onClick={() => setActiveTab('work')} className="w-16 h-16 bg-accent rounded-3xl flex items-center justify-center shadow-[0_15px_40px_rgba(201,255,69,0.3)] hover:scale-105 active:scale-90 transition-all">
                                <Icon name="play" className="text-black fill-current w-7 h-7 ml-1" />
                            </button>
                        </div>
                    </div>

                    <div className="bg-surface border border-border rounded-[2.5rem] p-7 space-y-6 shadow-xl">
                        <div className="flex items-center gap-2 mb-2">
                            <Icon name="activity" className="text-accent w-4 h-4" />
                            <h3 className="text-[10px] font-black uppercase text-text-dim tracking-widest">Metabolic & Readiness Stats</h3>
                        </div>
                        <div className="space-y-6">
                            <div className="space-y-3">
                                <div className="flex justify-between items-end">
                                    <span className="text-[10px] font-black uppercase tracking-widest text-text-dim/60">Sleep Quality Index</span>
                                    <span className="text-xl font-black text-white">{readiness.sleep}/10</span>
                                </div>
                                <input type="range" min="1" max="10" value={readiness.sleep} onChange={(e) => setReadiness({...readiness, sleep: e.target.value})} className="w-full accent-accent bg-surface-light h-1.5 rounded-lg appearance-none cursor-pointer" />
                            </div>
                            <div className="space-y-3">
                                <div className="flex justify-between items-end">
                                    <span className="text-[10px] font-black uppercase tracking-widest text-text-dim/60">Systemic Soreness</span>
                                    <span className="text-xl font-black text-white">{readiness.soreness}/10</span>
                                </div>
                                <input type="range" min="1" max="10" value={readiness.soreness} onChange={(e) => setReadiness({...readiness, soreness: e.target.value})} className="w-full accent-accent bg-surface-light h-1.5 rounded-lg appearance-none cursor-pointer" />
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderWorkout = () => (
                <div className="space-y-5 pb-28">
                    <div className="sticky top-0 -mx-4 px-4 py-3 bg-bg/80 backdrop-blur-xl border-b border-border/50 z-40 flex justify-between items-center">
                        <h1 className="text-lg font-black text-white truncate max-w-[150px]">{today.name}</h1>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setTimer({...timer, running: !timer.running})} className="p-2.5 bg-surface border border-border rounded-xl active:scale-95">
                                <Icon name="timer" className={`w-4 h-4 ${timer.running ? 'text-accent animate-pulse-soft' : 'text-text-dim'}`} />
                            </button>
                            <div className="text-mono font-black text-base bg-surface border border-border px-4 py-1.5 rounded-xl text-accent min-w-[70px] text-center shadow-inner">
                                {Math.floor(timer.remain/60).toString().padStart(2,'0')}:{(timer.remain%60).toString().padStart(2,'0')}
                            </div>
                        </div>
                    </div>

                    {today.type === 'rest' ? (
                        <div className="bg-surface border border-border rounded-[2.5rem] p-12 text-center space-y-6 mt-8 relative overflow-hidden">
                            <div className="absolute inset-0 bg-accent/5 blur-3xl pointer-events-none"></div>
                            <Icon name="moon" className="w-14 h-14 text-accent mx-auto" />
                            <div>
                                <h2 className="text-xl font-black text-white mb-2 uppercase tracking-tight">Recovery Architecture Active</h2>
                                <p className="text-text-dim text-sm leading-relaxed max-w-[280px] mx-auto opacity-70">Focus on neurological restoration, systemic hydration, and protein synthesis. Today is for growth.</p>
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-5">
                            {currentDraft?.exercises.map((ex, exIdx) => (
                                <div key={exIdx} className="bg-surface border border-border rounded-[2rem] p-5 shadow-xl relative overflow-hidden">
                                    <div className="flex justify-between items-center mb-5 px-1">
                                        <div className="flex items-center gap-3">
                                            <div className="w-1 h-5 bg-accent rounded-full shadow-[0_0_10px_rgba(201,255,69,0.5)]" />
                                            <h3 className="font-black text-white text-[15px] tracking-tight">{ex.name}</h3>
                                        </div>
                                        <span className="text-[9px] uppercase font-black text-text-dim bg-surface-light border border-border px-2.5 py-1 rounded-lg">Tactical Unit {exIdx+1}</span>
                                    </div>
                                    
                                    <div className="grid grid-cols-[24px_1fr_1fr_1fr_42px] gap-2 mb-2 px-1 text-[8px] font-black text-text-dim/30 uppercase text-center tracking-widest">
                                        <span>#</span><span>KG</span><span>RPS</span><span>RIR</span><span />
                                    </div>

                                    <div className="space-y-2.5">
                                        {ex.sets.map((set, sIdx) => {
                                            const sug = getSuggestedValues(ex.name, sIdx);
                                            const isSug = !set.weight && !set.reps && sug.weight;
                                            return (
                                                <div key={sIdx} className={`grid grid-cols-[24px_1fr_1fr_1fr_42px] gap-2 items-center transition-all ${set.done ? 'opacity-30 grayscale blur-[0.3px]' : ''}`}>
                                                    <span className="text-mono text-[10px] text-text-dim/50 text-center font-black">{sIdx+1}</span>
                                                    <input type="number" placeholder={sug.weight || "0"} value={set.weight} onChange={(e) => {
                                                        const n = [...currentDraft.exercises]; n[exIdx].sets[sIdx].weight = e.target.value; updateDraft({...currentDraft, exercises: n});
                                                    }} className={`w-full bg-surface-light border border-border rounded-xl h-11 text-center font-black text-white text-xs outline-none focus:border-accent/40 ${isSug ? 'placeholder:text-accent/30' : ''}`} />
                                                    <input type="number" placeholder={sug.reps || "0"} value={set.reps} onChange={(e) => {
                                                        const n = [...currentDraft.exercises]; n[exIdx].sets[sIdx].reps = e.target.value; updateDraft({...currentDraft, exercises: n});
                                                    }} className={`w-full bg-surface-light border border-border rounded-xl h-11 text-center font-black text-white text-xs outline-none focus:border-accent/40 ${isSug ? 'placeholder:text-accent/30' : ''}`} />
                                                    <input type="number" placeholder={sug.rir || "0"} value={set.rir} onChange={(e) => {
                                                        const n = [...currentDraft.exercises]; n[exIdx].sets[sIdx].rir = e.target.value; updateDraft({...currentDraft, exercises: n});
                                                    }} className={`w-full bg-surface-light border border-border rounded-xl h-11 text-center font-black text-white text-xs outline-none focus:border-accent/40 ${isSug ? 'placeholder:text-accent/30' : ''}`} />
                                                    <button onClick={() => {
                                                        const n = [...currentDraft.exercises]; const t = n[exIdx].sets[sIdx];
                                                        if (!t.weight && !t.reps && isSug) { t.weight = sug.weight; t.reps = sug.reps; t.rir = sug.rir; }
                                                        t.done = !t.done; updateDraft({...currentDraft, exercises: n});
                                                        if (t.done) setTimer({...timer, remain: timer.duration, running: true});
                                                    }} className={`h-11 flex items-center justify-center rounded-xl border transition-all ${set.done ? 'bg-accent border-accent text-black shadow-lg shadow-accent/20' : 'bg-surface-light border-border text-text-dim/60'}`}>
                                                        {set.done ? <Icon name="check" className="w-5 h-5 fill-current" /> : (isSug ? <Icon name="activity" className="w-4 h-4 text-accent animate-pulse" /> : <Icon name="plus" className="w-4 h-4" />)}
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                            <div className="pt-4">
                                <button onClick={finishSession} className="w-full bg-accent text-black py-5 rounded-[2.2rem] font-black uppercase text-sm tracking-[0.2em] shadow-[0_20px_40px_rgba(201,255,69,0.3)] active:scale-95 flex items-center justify-center gap-3">
                                    <Icon name="trophy" className="w-6 h-6 fill-current" />
                                    Synchronize Session Data
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            const renderEditor = () => (
                <div className="space-y-6 pb-28">
                    <header className="flex justify-between items-center px-1 pt-2">
                        <h2 className="text-xl font-black text-white uppercase tracking-tight">Split Engine</h2>
                        <button onClick={() => setProgram(INITIAL_PROGRAM)} className="text-[10px] font-black text-accent/50 border border-accent/20 px-3 py-1.5 rounded-xl uppercase">Reset to Factory</button>
                    </header>

                    <div className="flex gap-2.5 overflow-x-auto no-scrollbar -mx-4 px-4 pb-2">
                        {program.map((day, idx) => (
                            <button key={idx} onClick={() => setCurrentDayIdx(idx)} className={`px-5 py-3.5 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap border-2 transition-all ${currentDayIdx === idx ? 'bg-accent border-accent text-black shadow-xl shadow-accent/20' : 'bg-surface border-border text-text-dim/60 opacity-60'}`}>
                                D{day.dayIndex} {day.name}
                            </button>
                        ))}
                    </div>

                    <div className="bg-surface border border-border rounded-[2.5rem] p-6 space-y-6 shadow-2xl relative">
                        <div className="space-y-2">
                             <label className="text-[9px] font-black uppercase tracking-widest text-text-dim px-2">Day Identifier</label>
                             <input type="text" value={program[currentDayIdx].name} onChange={(e) => { const n = [...program]; n[currentDayIdx].name = e.target.value; setProgram(n); }} className="w-full bg-surface-light border border-border h-14 rounded-2xl px-5 text-sm font-black text-white outline-none focus:border-accent/40 shadow-inner" />
                        </div>
                        <div className="space-y-4 pt-4">
                            <h3 className="text-[10px] font-black uppercase text-text-dim tracking-widest px-2 flex justify-between">Exercise Matrix <span>{program[currentDayIdx].exercises.length} Units</span></h3>
                            <div className="space-y-3">
                                <AnimatePresence>
                                    {program[currentDayIdx].exercises.map((ex, eIdx) => (
                                        <motion.div initial={{opacity:0, x:-10}} animate={{opacity:1, x:0}} key={eIdx} className="grid grid-cols-[1fr_64px_48px] gap-2.5 items-center group">
                                            <input type="text" value={ex.name} onFocus={() => { setLibTarget({dIdx: currentDayIdx, eIdx}); setIsLibOpen(true); }} onChange={(e) => { const n = [...program]; n[currentDayIdx].exercises[eIdx].name = e.target.value; setProgram(n); }} className="w-full bg-surface-light border border-border h-12 rounded-2xl px-4 text-[13px] font-bold text-white outline-none focus:border-accent/40" />
                                            <div className="relative">
                                                <input type="number" value={ex.sets} onChange={(e) => { const n = [...program]; n[currentDayIdx].exercises[eIdx].sets = parseInt(e.target.value)||1; setProgram(n); }} className="w-full bg-surface-light border border-border h-12 text-center font-black text-white outline-none rounded-2xl" />
                                                <span className="absolute -top-3 left-0 w-full text-center text-[7px] font-bold text-text-dim uppercase opacity-60 tracking-tighter">Sets</span>
                                            </div>
                                            <button onClick={() => { const n = [...program]; n[currentDayIdx].exercises.splice(eIdx, 1); setProgram(n); }} className="w-12 h-12 flex items-center justify-center bg-red-500/5 hover:bg-red-500 text-red-500/40 hover:text-black rounded-2xl transition-all"><Icon name="trash" className="w-5 h-5"/></button>
                                        </motion.div>
                                    ))}
                                </AnimatePresence>
                                <button onClick={() => { const n = [...program]; n[currentDayIdx].exercises.push({name: "", sets: 3}); setProgram(n); }} className="w-full py-4 bg-surface border-2 border-dashed border-border text-accent/40 hover:text-accent rounded-2xl text-[10px] font-black uppercase transition-all flex items-center justify-center gap-2"><Icon name="plus" className="w-4 h-4"/> Inject Knowledge Unit</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderData = () => (
                <div className="space-y-6 pb-28">
                    <header className="flex items-center gap-3 pt-4 px-1">
                        <div className="w-12 h-12 bg-accent/20 border border-accent/20 rounded-2xl flex items-center justify-center shadow-xl shadow-accent/10"><Icon name="chart" className="text-accent w-6 h-6" /></div>
                        <h1 className="text-xl font-black text-white uppercase tracking-tight leading-none">Intelligence Dashboard</h1>
                    </header>
                    <div className="bg-surface border border-border rounded-[2.5rem] p-7 space-y-5 shadow-2xl">
                        <h3 className="text-[10px] font-black uppercase text-text-dim tracking-widest px-1 mb-4 leading-none">Peak Strength Vectors (PRs)</h3>
                        <div className="space-y-3">
                            {Object.entries(prs).map(([name, pr], i) => (
                                <div key={i} className="flex justify-between items-center bg-surface-light px-5 py-4 rounded-3xl border border-border hover:border-accent/40 shadow-md">
                                    <div className="text-left"><div className="font-black text-[14px] text-white/90 leading-tight">{name}</div><div className="text-[8px] uppercase tracking-widest font-black text-text-dim opacity-50 mt-1">{new Date(pr.date).toLocaleDateString()}</div></div>
                                    <div className="text-right flex flex-col items-end"><div className="text-accent font-black text-xl leading-none">{Math.round(pr.e1rm)}<small className="text-[10px] ml-1">kg</small></div><div className="text-[8px] uppercase font-black text-text-dim/40 tracking-widest mt-1">EST 1RM</div></div>
                                </div>
                            ))}
                            {Object.keys(prs).length === 0 && <p className="text-center py-16 text-text-dim text-xs opacity-20 font-black uppercase tracking-[0.2em]">Data stream empty</p>}
                        </div>
                    </div>

                    <div className="bg-surface border border-border rounded-[2.5rem] p-7 shadow-2xl">
                        <h3 className="text-[10px] font-black uppercase text-text-dim tracking-widest px-1 mb-6 leading-none">Metric Trend Window (Volume)</h3>
                        <div className="h-48 flex items-end gap-3 px-2 border-b border-border/10 pb-2">
                             {sessions.slice(0, 7).reverse().map((s, i) => (
                                <div key={i} className="flex-1 bg-accent/70 hover:bg-accent rounded-xl shadow-[0_10px_30px_rgba(201,255,69,0.2)] transition-all" style={{height: `${Math.min(100, (s.exercises.length * 15))}%`}} />
                             ))}
                             {sessions.length === 0 && <div className="w-full text-center text-[10px] font-black text-text-dim/10 pb-20 uppercase tracking-[0.3em]">Awaiting Cycle Initiation</div>}
                        </div>
                    </div>
                </div>
            );

            // --- Sub-Modals ---

            const LibraryModal = () => {
                const [cat, setCat] = useState(null);
                const results = useMemo(() => {
                    let r = [];
                    Object.entries(EXERCISE_LIBRARY).forEach(([muscle, list]) => {
                        if (!cat || cat === muscle) list.forEach(name => {
                            if (!libSearch || name.toLowerCase().includes(libSearch.toLowerCase())) r.push({ name, muscle });
                        });
                    });
                    return r;
                }, [cat, libSearch]);

                const selectEx = (name) => {
                    const n = [...program]; n[libTarget.dIdx].exercises[libTarget.eIdx].name = name;
                    setProgram(n); setIsLibOpen(false);
                };

                return (
                    <motion.div initial={{y:'100%'}} animate={{y:0}} exit={{y:'100%'}} className="fixed inset-0 z-[100] bg-bg flex flex-col">
                        <header className="p-4 border-b border-border/40 flex justify-between items-center bg-surface/80 backdrop-blur-3xl sticky top-0 z-50">
                            <div className="flex gap-3 items-center">
                                <h2 className="font-black text-white text-sm uppercase">Analytical Library</h2>
                                <span className="text-accent bg-accent/10 px-2 py-0.5 rounded-lg text-[9px] font-black uppercase">{results.length} UNITS</span>
                            </div>
                            <button onClick={() => setIsLibOpen(false)} className="w-12 h-12 bg-surface-light border border-border rounded-2xl flex items-center justify-center text-text-dim"><Icon name="x" /></button>
                        </header>
                        <div className="p-5 space-y-5">
                            <div className="relative group">
                                <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-text-dim group-focus-within:text-accent w-4 h-4 transition-colors" />
                                <input type="text" placeholder="Decode tactical biomechanics..." value={libSearch} onChange={(e)=>setLibSearch(e.target.value)} className="w-full bg-surface-light border border-border h-14 rounded-2xl pl-12 pr-5 text-sm font-black text-white outline-none focus:ring-1 focus:ring-accent/40" />
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar -mx-5 px-5 pb-1">
                                <button onClick={() => setCat(null)} className={`px-5 py-3 rounded-2xl text-[9px] font-black uppercase whitespace-nowrap border-2 ${!cat ? 'bg-accent border-accent text-black shadow-lg shadow-accent/20' : 'bg-surface border-border text-text-dim opacity-70'}`}>Universal</button>
                                {Object.keys(EXERCISE_LIBRARY).map(c => (
                                    <button key={c} onClick={()=>setCat(c)} className={`px-5 py-3 rounded-2xl text-[9px] font-black uppercase whitespace-nowrap border-2 ${cat === c ? 'bg-accent border-accent text-black shadow-lg shadow-accent/20' : 'bg-surface border-border text-text-dim opacity-70'}`}>{c.split('/')[0]}</button>
                                ))}
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto px-5 pb-28 space-y-2">
                            {results.map((r, i) => (
                                <button key={i} onClick={()=>selectEx(r.name)} className="w-full flex justify-between items-center p-4 bg-surface border border-border rounded-2xl active:scale-95 group transition-all">
                                    <div className="text-left flex items-center gap-4">
                                        <div className="w-11 h-11 bg-surface-light border border-border rounded-xl flex items-center justify-center"><Icon name="dumb" className="text-accent/30 group-hover:text-accent transition-colors" /></div>
                                        <div><div className="font-black text-white text-[14px] leading-tight group-hover:text-accent transition-colors">{r.name}</div><div className="text-[9px] uppercase font-black text-text-dim opacity-50 tracking-widest mt-1">{r.muscle.split('/')[0]}</div></div>
                                    </div>
                                    <Icon name="plus" className="text-accent/40" />
                                </button>
                            ))}
                            {results.length === 0 && <div className="py-24 text-center text-text-dim font-black uppercase italic text-xs tracking-widest opacity-30">Zero match identified</div>}
                        </div>
                    </motion.div>
                );
            };

            return (
                <div className="min-h-screen bg-bg text-slate-200 selection:bg-accent selection:text-black">
                    <div className="max-w-md mx-auto p-4 pt-10 relative z-10">
                        <AnimatePresence mode="wait">
                            {activeTab === 'hub' && <motion.div key="h" initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} exit={{opacity:0, y:-10}}>{renderHub()}</motion.div>}
                            {activeTab === 'work' && <motion.div key="w" initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} exit={{opacity:0, y:-10}}>{renderWorkout()}</motion.div>}
                            {activeTab === 'plan' && <motion.div key="p" initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} exit={{opacity:0, y:-10}}>{renderEditor()}</motion.div>}
                            {activeTab === 'data' && <motion.div key="d" initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} exit={{opacity:0, y:-10}}>{renderData()}</motion.div>}
                        </AnimatePresence>
                    </div>

                    {/* Elite Bottom Dock */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-[380px] z-50">
                        <div className="glass-dock rounded-[2.8rem] p-2 flex items-center justify-between shadow-2xl ring-1 ring-white/5">
                            <button onClick={()=>setActiveTab('hub')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 h-14 rounded-[2.2rem] transition-all duration-300 ${activeTab === 'hub' ? 'bg-accent text-black font-black font-mono shadow-xl shadow-accent/20' : 'text-text-dim opacity-50'}`}><Icon name="layout" fill={activeTab==='hub'}/><span className="text-[8px] uppercase font-black tracking-widest">Hub</span></button>
                            <button onClick={()=>setActiveTab('work')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 h-14 rounded-[2.2rem] transition-all duration-300 ${activeTab === 'work' ? 'bg-accent text-black font-black font-mono shadow-xl shadow-accent/20' : 'text-text-dim opacity-50'}`}><Icon name="zap" fill={activeTab==='work'}/><span className="text-[8px] uppercase font-black tracking-widest">Work</span></button>
                            <button onClick={()=>setActiveTab('plan')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 h-14 rounded-[2.2rem] transition-all duration-300 ${activeTab === 'plan' ? 'bg-accent text-black font-black font-mono shadow-xl shadow-accent/20' : 'text-text-dim opacity-50'}`}><Icon name="dumb" fill={activeTab==='plan'}/><span className="text-[8px] uppercase font-black tracking-widest">Plan</span></button>
                            <button onClick={()=>setActiveTab('data')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 h-14 rounded-[2.2rem] transition-all duration-300 ${activeTab === 'data' ? 'bg-accent text-black font-black font-mono shadow-xl shadow-accent/20' : 'text-text-dim opacity-50'}`}><Icon name="chart" fill={activeTab==='data'}/><span className="text-[8px] uppercase font-black tracking-widest">Data</span></button>
                        </div>
                    </div>

                    <AnimatePresence>{isLibOpen && <LibraryModal />}</AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
