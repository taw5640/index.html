        /* 
           --- ELEGANT DARK SYSTEM DESIGN SYSTEM ---
           Inspired by high-end bio-hacking & tactical interfaces
        */
        :root {
            --bg: #050506;
            --surface-low: #0c0d10;
            --surface-mid: #121418;
            --surface-high: #1c1f26;
            --accent: #c9ff45; /* Toxic Pulse Neon */
            --accent-dim: #98c232;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --text-hyper-dim: #475569;
            --border: #23272f;
            --danger: #ef4444;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--font-sans);
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            overscroll-behavior-y: contain;
            -webkit-font-smoothing: antialiased;
        }

        /* Tactical Background Decor */
        .master-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: 
                radial-gradient(circle at 10% 20%, rgba(201, 255, 69, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(201, 255, 69, 0.02) 0%, transparent 40%),
                linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.5));
        }

        /* Scrollbar Stealth Mode */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Typography & Custom Elements */
        .text-mono { font-family: var(--font-mono); font-weight: 700; }
        .font-black { font-weight: 900; }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Glassmorphism Classes */
        .glass-header {
            background: rgba(12, 13, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .glass-card {
            background: var(--surface-mid);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:active { transform: scale(0.98); }

        /* Custom Range Slider Styling */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track {
            background: var(--surface-high);
            border-radius: 10px;
            height: 6px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: -7px;
            box-shadow: 0 0 15px rgba(201, 255, 69, 0.4);
            cursor: pointer;
        }

        /* Nav Dock Shadow */
        .dock-shadow {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.8), 0 0 20px rgba(201, 255, 69, 0.05);
        }

        /* Pulse Animation */
        @keyframes subtle-pulse {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.8; filter: brightness(1.2); }
        }
        .pulse-active { animation: subtle-pulse 1.5s infinite ease-in-out; }

        #root { position: relative; z-index: 10; }
    </style>
</head>

        // Comprehensive Mapping logic
        const MASTER_REF = {};
        Object.entries(MASTER_LIBRARY).forEach(([sector, units]) => {
            units.forEach(unit => {
                MASTER_REF[unit] = { 
                    sector: sector.split('(')[0].trim(),
                    chain: sector.toLowerCase().includes('anterior') ? 'Anterior' : 'Posterior'
                };
            });
        });

        // --- CORE PROGRAM ARCHITECTURE ---
        const DEFAULT_PROGRAM = [
            { id: "A1", idx: 1, name: "Alpha Core: Anterior", type: "train", focus: "Chest, Quads, Delts", exercises: [
                { name: "Barbell Bench Press (Standard)", sets: 3 },
                { name: "Back Squat (High Bar)", sets: 3 },
                { name: "Arnold Press (Dumbbell)", sets: 3 },
                { name: "Leg Extensions (Machine)", sets: 3 }

                { name: "Barbell Row (Bent Over)", sets: 3 },
                { name: "Lying Leg Curls (Machine)", sets: 3 },

            ]},
            { id: "R2", idx: 4, name: "Metabolic Reset", type: "rest", focus: "Hypertrophic Adaptation", exercises: [] }
        ];

        // --- UTILITY LOGIC ---
        const formatTime = (s) => {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        };

        const STORAGE_KEY = "pulse_ai_full_v4";

        // --- MAIN APPLICATION COMPONENT ---
        function App() {
            // View Navigation State
            const [view, setView] = useState('hub');
            const [activeDayIdx, setActiveDayIdx] = useState(0);
            const [editorDayIdx, setEditorDayIdx] = useState(0);
            
            // Core Data State
            const [program, setProgram] = useState(DEFAULT_PROGRAM);
            const [sessions, setSessions] = useState([]);
            const [prs, setPrs] = useState({});
            const [drafts, setDrafts] = useState({});
            
            // Readiness State
            const [readiness, setReadiness] = useState({ sleep: 8, fatigue: 3 });
            
            // UI State
            const [libUI, setLibUI] = useState({ open: false, target: null, search: "" });
            const [timer, setTimer] = useState({ duration: 90, remain: 90, running: false });

            // 1. Storage Hydration
            useEffect(() => {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    try {
                        const d = JSON.parse(raw);
                        if (d.program) setProgram(d.program);
                        if (d.sessions) setSessions(d.sessions);
                        if (d.prs) setPrs(d.prs);
                        if (d.drafts) setDrafts(d.drafts);
                        if (d.readiness) setReadiness(d.readiness);
                    } catch (e) { console.error("Neural Stream Corrupted", e); }
                }
            }, []);

            // 2. Storage Persistance
            useEffect(() => {
                const data = { program, sessions, prs, drafts, readiness };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }, [program, sessions, prs, drafts, readiness]);

            // 3. Timer Engine
            useEffect(() => {
                let interval;
                if (timer.running && timer.remain > 0) {
                    interval = setInterval(() => setTimer(t => ({ ...t, remain: t.remain - 1 })), 1000);
                } else if (timer.remain === 0 && timer.running) {
                    setTimer(t => ({ ...t, running: false }));
                    if (window.navigator?.vibrate) window.navigator.vibrate([200, 100, 200]);
                }
                return () => clearInterval(interval);
            }, [timer.running, timer.remain]);

            // --- Intelligence Operations ---
            const today = program[activeDayIdx] || program[0];

            const currentWorkoutDraft = useMemo(() => {
                if (today.type === 'rest') return null;
                const existing = drafts[today.id];
                if (existing) return existing;
                return {
                    id: today.id,
                    name: today.name,
                    exercises: today.exercises.map(ex => ({
                        name: ex.name,
                        sets: Array.from({ length: ex.sets }, () => ({
                            w: '', r: '', rir: '', done: false
                        }))
                    }))
                };
            }, [activeDayIdx, program, drafts]);

            // Logic: Predictive Suggestions based on history
            const getSuggestion = useCallback((name, setIdx) => {
                // Look through historical sessions
                for (const s of sessions) {
                    const ex = s.exercises.find(e => e.name === name);
                    if (ex && ex.sets[setIdx] && ex.sets[setIdx].done) {
                        return ex.sets[setIdx];
                    }
                }
                // Fallback to PR for that exercise
                const pr = prs[name];
                if (pr) return { w: pr.w, r: pr.r, rir: '2' };
                return { w: '', r: '', rir: '' };
            }, [sessions, prs]);

            const finishWorkout = () => {
                if (!currentWorkoutDraft) return;
                const session = { 
                    ...currentWorkoutDraft, 
                    date: new Date().toISOString(),
                    score: readiness.sleep - readiness.fatigue
                };

                const updatedPrs = { ...prs };
                session.exercises.forEach(ex => {
                    ex.sets.forEach(s => {
                        if (s.done && s.w && s.r) {
                            const e1rm = parseFloat(s.w) * (1 + parseInt(s.r)/30);
                            if (!updatedPrs[ex.name] || e1rm > updatedPrs[ex.name].e1rm) {
                                updatedPrs[ex.name] = { e1rm, w: s.w, r: s.r, date: session.date };
                            }
                        }
                    });
                });

                setSessions([session, ...sessions]);
                setPrs(updatedPrs);
                setDrafts(prev => {
                    const { [today.id]: removed, ...others } = prev;
                    return others;
                });
                setView('hub');
            };

            // --- Component Library Infrastructure ---

            const Icon = ({ name, cls = "w-5 h-5", fill = false }) => {

                    moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z" />,
                    trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />,

                    history: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5M12 7v5l4 2" />
                };
                return (

            const MetricItem = ({ label, value, unit, sub }) => (

                        {unit && <span className="text-xs font-black text-text-dim/50 mb-1">{unit}</span>}
                    </div>
                    <span className="text-[9px] font-black text-accent uppercase tracking-tighter">{sub}</span>
                </div>
            );

            // --- VIEW RENDERERS ---

            const renderHub = () => (
                <div className="space-y-6 pb-28">
                    <header className="flex justify-between items-center pt-2">
                        <div>
                            <div className="text-[10px] uppercase font-black tracking-[0.2em] text-accent/50 mb-0.5">Neural Pulse v4</div>
                            <h1 className="text-2xl font-black text-white tracking-tight">Main Controller</h1>
                        </div>
                        <div className="px-4 py-1.5 bg-accent/10 border border-accent/20 rounded-xl text-accent text-xs font-black">
                            CYCLE D{today.idx}
                        </div>
                    </header>

                    <div className="grid grid-cols-2 gap-3.5">
                        <MetricItem label="Sessions Run" value={sessions.length} unit="pts" sub="Active Loyalty" />
                        <MetricItem label="Readiness" value="94" unit="%" sub="Optimal System" />
                        <MetricItem label="PR Count" value={Object.keys(prs).length} unit="set" sub="Peaking Units" />
                        <MetricItem label="Fatigue" value={readiness.fatigue} unit="lvl" sub="CNS Metric" />
                    </div>

                    <div className="bg-surface-mid border border-border rounded-[2.5rem] p-7 shadow-2xl relative overflow-hidden group">
                        <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-all rotate-12 group-hover:scale-110">
                            <Icon name="zap" cls="w-24 h-24 text-accent" />
                        </div>
                        <div className="flex justify-between items-center mb-1 relative z-10">
                            <span className="text-[10px] font-black text-accent/60 uppercase tracking-widest">Today's Directive</span>
                            <span className="text-[10px] font-black bg-accent/10 border border-accent/20 text-accent px-3 py-1 rounded-full">{today.type} Phase</span>
                        </div>
                        <div className="flex items-end justify-between relative z-10">
                            <div className="space-y-1">
                                <h2 className="text-3xl font-black text-white uppercase tracking-tight">{today.name}</h2>
                                <p className="text-xs text-text-dim font-medium max-w-[200px] leading-relaxed italic opacity-80">"{today.focus}"</p>
                            </div>
                            <button onClick={() => setView('workout')} className="w-16 h-16 bg-accent rounded-3xl flex items-center justify-center shadow-[0_15px_40px_rgba(201,255,69,0.3)] hover:scale-105 active:scale-90 transition-all">
                                <Icon name="play" cls="text-black fill-current w-7 h-7 ml-1" />
                            </button>
                        </div>
                    </div>

                    <div className="bg-surface-mid border border-border rounded-[2.5rem] p-7 space-y-7 shadow-xl">
                        <div className="flex items-center gap-2 mb-1">
                            <Icon name="zap" cls="w-4 h-4 text-accent" />
                            <h3 className="text-[10px] font-black uppercase tracking-widest text-text-dim">Metabolic Readiness Stream</h3>
                        </div>
                        <div className="space-y-7">
                            <div className="space-y-3">
                                <div className="flex justify-between text-[11px] font-black text-text-dim/60 uppercase tracking-widest">
                                    <span>Sleep Protocol</span><span>{readiness.sleep}/10</span>
                                </div>
                                <input type="range" min="1" max="10" value={readiness.sleep} onChange={(e)=>setReadiness({...readiness, sleep:e.target.value})} className="w-full" />
                            </div>
                            <div className="space-y-3">
                                <div className="flex justify-between text-[11px] font-black text-text-dim/60 uppercase tracking-widest">
                                    <span>System Fatigue</span><span>{readiness.fatigue}/10</span>
                                </div>
                                <input type="range" min="1" max="10" value={readiness.fatigue} onChange={(e)=>setReadiness({...readiness, fatigue:e.target.value})} className="w-full" />
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderWorkout = () => (
                <div className="space-y-5 pb-28">
                    <div className="sticky top-0 -mx-4 px-4 py-3 bg-bg/90 backdrop-blur-2xl border-b border-border/50 z-40 flex justify-between items-center">
                        <div className="flex flex-col">
                            <h1 className="text-sm font-black text-white uppercase tracking-wider">{today.name}</h1>
                            <span className="text-[9px] font-medium text-text-dim">{today.focus}</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={()=>setTimer({...timer, running: !timer.running})} className="w-10 h-10 bg-surface-mid border border-border rounded-xl flex items-center justify-center">
                                <Icon name="timer" cls={`w-4 h-4 ${timer.running ? 'text-accent pulse-active' : 'text-text-dim'}`} />
                            </button>
                            <div className="text-mono font-black text-base bg-surface-mid border border-border px-4 py-1.5 rounded-xl text-accent min-w-[70px] text-center shadow-inner">
                                {formatTime(timer.remain)}
                            </div>
                        </div>
                    </div>

                    {today.type === 'rest' ? (
                        <div className="py-20 text-center space-y-6">
                            <div className="w-20 h-20 bg-accent/5 border border-accent/10 rounded-full flex items-center justify-center mx-auto mb-2">
                                <Icon name="moon" cls="w-10 h-10 text-accent" />
                            </div>
                            <div className="space-y-2">
                                <h2 className="text-xl font-black text-white uppercase tracking-tight">Recovery Protocol Active</h2>
                                <p className="text-xs text-text-dim max-w-[280px] mx-auto leading-relaxed">Neural pathways are reconstructing. Metabolic waste is clearing. Hypertrophy is maximized during this reboot phase.</p>
                            </div>
                            <button onClick={()=>setView('hub')} className="px-8 py-3 bg-surface-mid border border-border rounded-2xl text-[10px] font-black uppercase tracking-widest text-accent">Return to Control</button>
                        </div>
                    ) : (
                        <div className="space-y-5">
                            {currentWorkoutDraft?.exercises.map((ex, exIdx) => (
                                <div key={exIdx} className="bg-surface-mid border border-border rounded-[2.2rem] p-5 shadow-2xl relative border-t-4 border-t-accent/10">
                                    <div className="flex justify-between items-center mb-5 px-1">
                                        <div className="flex items-center gap-3">
                                            <div className="w-1.5 h-6 bg-accent rounded-full" />
                                            <h3 className="font-black text-white text-[15px] uppercase tracking-tight leading-none">{ex.name}</h3>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-[24px_1fr_1fr_1fr_44px] gap-2.5 mb-2.5 text-[8px] font-black text-text-dim/40 uppercase tracking-widest text-center">
                                        <span>Set</span><span>Weight</span><span>Reps</span><span>RIR</span><span />
                                    </div>
                                    <div className="space-y-2.5">
                                        {ex.sets.map((set, sIdx) => {
                                            const sugg = getSuggestion(ex.name, sIdx);
                                            const showSugg = !set.w && !set.r && sugg.w;
                                            return (
                                                <div key={sIdx} className={`grid grid-cols-[24px_1fr_1fr_1fr_44px] gap-2.5 items-center transition-all ${set.done ? 'opacity-30 blur-[0.2px]' : ''}`}>
                                                    <span className="text-[10px] font-black text-text-dim/50 text-center tracking-tighter">{sIdx+1}</span>
                                                    <input type="number" placeholder={sugg.w || "0"} value={set.w} onChange={(e)=>{
                                                        const n = [...currentWorkoutDraft.exercises]; n[exIdx].sets[sIdx].w = e.target.value; updateDraft({...currentWorkoutDraft, exercises: n});
                                                    }} className={`w-full bg-surface-high border border-border rounded-xl h-11 text-center font-black text-white text-xs outline-none focus:border-accent/50 ${showSugg ? 'placeholder:text-accent/30' : ''}`} />
                                                    <input type="number" placeholder={sugg.r || "0"} value={set.r} onChange={(e)=>{
                                                        const n = [...currentWorkoutDraft.exercises]; n[exIdx].sets[sIdx].r = e.target.value; updateDraft({...currentWorkoutDraft, exercises: n});
                                                    }} className={`w-full bg-surface-high border border-border rounded-xl h-11 text-center font-black text-white text-xs outline-none focus:border-accent/50 ${showSugg ? 'placeholder:text-accent/30' : ''}`} />
                                                    <input type="number" placeholder={sugg.rir || "0"} value={set.rir} onChange={(e)=>{
                                                        const n = [...currentWorkoutDraft.exercises]; n[exIdx].sets[sIdx].rir = e.target.value; updateDraft({...currentWorkoutDraft, exercises: n});
                                                    }} className={`w-full bg-surface-high border border-border rounded-xl h-11 text-center font-black text-white text-xs outline-none focus:border-accent/50 ${showSugg ? 'placeholder:text-accent/30' : ''}`} />
                                                    <button onClick={() => {
                                                        const n = [...currentWorkoutDraft.exercises]; const target = n[exIdx].sets[sIdx];
                                                        if (!target.w && !target.r && showSugg) { target.w = sugg.w; target.r = sugg.r; target.rir = sugg.rir; }
                                                        target.done = !target.done; updateDraft({...currentWorkoutDraft, exercises: n});
                                                        if (target.done) setTimer({...timer, remain: timer.duration, running: true});
                                                    }} className={`h-11 flex items-center justify-center rounded-xl border transition-all ${set.done ? 'bg-accent border-accent text-black shadow-xl ring-4 ring-accent/10' : 'bg-surface-high border-border text-text-dim/60'}`}>
                                                        {set.done ? <Icon name="check" cls="w-5 h-5 fill-current" /> : (showSugg ? <Icon name="zap" cls="w-4 h-4 text-accent animate-pulse" /> : <Icon name="plus" cls="w-4 h-4" />)}
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                            <button onClick={finishWorkout} className="w-full bg-accent text-black h-20 rounded-[2.5rem] font-black uppercase text-sm tracking-[0.25em] shadow-[0_20px_50px_rgba(201,255,69,0.25)] active:scale-95 transition-all flex items-center justify-center gap-3 mt-4">
                                <Icon name="trophy" cls="w-6 h-6 fill-current" />
                                Synchronize Protocol Results
                            </button>
                        </div>
                    )}
                </div>
            );

            const renderEditor = () => (
                <div className="space-y-6 pb-28">
                    <header className="flex justify-between items-center px-1 pt-2">
                        <h2 className="text-xl font-black text-white uppercase tracking-tight">Split Designer</h2>
                        <button onClick={()=>setProgram(DEFAULT_PROGRAM)} className="text-[10px] font-black uppercase text-accent/50 hover:text-accent tracking-widest transition-colors">Default Architecture</button>
                    </header>
                    <div className="flex gap-2.5 overflow-x-auto no-scrollbar -mx-4 px-4 pb-2">
                        {program.map((day, idx) => (
                            <button key={idx} onClick={()=>setEditorDayIdx(idx)} className={`px-5 py-3.5 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap border-2 transition-all ${editorDayIdx === idx ? 'bg-accent border-accent text-black shadow-xl shadow-accent/20 scale-105' : 'bg-surface-mid border-border text-text-dim opacity-60'}`}>
                                D{day.idx} - {day.name}
                            </button>
                        ))}
                    </div>
                    <div className="bg-surface-mid border border-border rounded-[2.5rem] p-6 space-y-6 shadow-2xl relative">
                        <div className="space-y-2">
                             <label className="text-[9px] font-black uppercase tracking-widest text-text-dim/60 px-2">Phase Identifier</label>
                             <input type="text" value={program[editorDayIdx].name} onChange={(e) => { const n = [...program]; n[editorDayIdx].name = e.target.value; setProgram(n); }} className="w-full bg-surface-high border border-border h-14 rounded-2xl px-5 text-sm font-black text-white outline-none focus:border-accent/40" placeholder="Phase Code..." />
                        </div>
                        <div className="space-y-4 pt-4 border-t border-border/30">
                            <div className="flex justify-between items-center px-2">
                                <h3 className="text-[10px] font-black uppercase text-text-dim tracking-[0.2em] leading-none">Macro Structure</h3>
                                <span className="text-[9px] text-text-dim italic font-black">{program[editorDayIdx].exercises.length} Units</span>
                            </div>
                            <div className="space-y-3">
                                {program[editorDayIdx].exercises.map((ex, eIdx) => (
                                    <div key={eIdx} className="grid grid-cols-[1fr_64px_48px] gap-2.5 items-center group">
                                        <input type="text" value={ex.name} onFocus={()=>{ setLibUI({open:true, target:{d:editorDayIdx, e:eIdx}, search:""}); }} onChange={(e)=>{ const n = [...program]; n[editorDayIdx].exercises[eIdx].name = e.target.value; setProgram(n); }} className="w-full bg-surface-high border border-border h-12 rounded-2xl px-4 text-[13px] font-bold text-white outline-none focus:border-accent/40" />
                                        <div className="relative">
                                            <input type="number" value={ex.sets} onChange={(e)=>{ const n = [...program]; n[editorDayIdx].exercises[eIdx].sets = parseInt(e.target.value)||1; setProgram(n); }} className="w-full bg-surface-high border border-border h-12 text-center font-black text-white outline-none rounded-2xl" />
                                            <span className="absolute -top-3 left-0 w-full text-center text-[7px] font-black text-text-dim uppercase tracking-tighter opacity-40">Sets</span>
                                        </div>
                                        <button onClick={()=>{ const n = [...program]; n[editorDayIdx].exercises.splice(eIdx, 1); setProgram(n); }} className="w-12 h-12 flex items-center justify-center bg-red-500/5 hover:bg-red-500 text-red-500/40 hover:text-black rounded-2xl transition-all"><Icon name="trash" cls="w-5 h-5"/></button>
                                    </div>
                                ))}
                                <button onClick={()=>{ const n = [...program]; n[editorDayIdx].exercises.push({name:"", sets:3}); setProgram(n); }} className="w-full h-14 bg-surface-mid border-2 border-dashed border-border text-accent/50 hover:text-accent rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 transition-all">
                                    <Icon name="plus" cls="w-4 h-4" /> Inject Biological Unit
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderAnalytics = () => (
                <div className="space-y-6 pb-28">
                    <header className="flex items-center gap-3 pt-4 px-1">
                        <div className="w-12 h-12 bg-accent/20 border border-accent/20 rounded-2xl flex items-center justify-center shadow-xl shadow-accent/10"><Icon name="data" cls="text-accent w-6 h-6" /></div>
                        <h1 className="text-xl font-black text-white uppercase tracking-tight">Intelligence Dashboard</h1>
                    </header>
                    <div className="bg-surface-mid border border-border rounded-[2.5rem] p-7 space-y-5 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-5 rotate-12"><Icon name="trophy" cls="w-20 h-20 text-accent" /></div>
                        <h3 className="text-[10px] font-black uppercase text-text-dim tracking-widest mb-4 leading-none relative z-10">Historical Peak Vectors (PRs)</h3>
                        <div className="space-y-3 relative z-10">
                            {Object.entries(prs).map(([name, pr], i) => (
                                <div key={i} className="flex justify-between items-center bg-surface-high px-5 py-4 rounded-3xl border border-border hover:border-accent/20 shadow-lg group">
                                    <div>
                                        <div className="font-black text-[14px] text-white/90 leading-tight group-hover:text-accent transition-colors">{name}</div>
                                        <div className="text-[8px] uppercase tracking-widest font-black text-text-dim opacity-50 mt-1">Achieved: {new Date(pr.date).toLocaleDateString()}</div>
                                    </div>
                                    <div className="flex flex-col items-end">
                                        <div className="text-accent font-black text-2xl leading-none">{Math.round(pr.e1rm)}<small className="text-[11px] ml-1 opacity-60">kg</small></div>
                                        <div className="text-[8px] uppercase font-black text-text-dim/40 tracking-[0.2em] mt-2">Peak e1RM</div>
                                    </div>
                                </div>
                            ))}
                            {Object.keys(prs).length === 0 && <p className="text-center py-20 text-text-dim text-xs opacity-20 font-black uppercase tracking-[0.3em] font-mono">Neural Stream Unavailable</p>}
                        </div>
                    </div>

                    <div className="bg-surface-mid border border-border rounded-[2.5rem] p-8 shadow-2xl flex flex-col justify-between">
                         <h3 className="text-[10px] font-black uppercase text-text-dim tracking-widest mb-8 leading-none">Hypertrophy Cycle Volume</h3>
                         <div className="h-44 flex items-end gap-3 px-2 border-b border-border/10 pb-2 mb-4">
                              {sessions.slice(0, 7).reverse().map((s, i) => (
                                 <div key={i} className="flex-1 bg-accent/70 hover:bg-accent rounded-xl shadow-[0_10px_30px_rgba(201,255,69,0.3)] transition-all cursor-pointer group relative" style={{height: `${Math.min(100, (s.exercises.length * 20))}%`}}>
                                    <div className="absolute -top-8 left-1/2 -translate-x-1/2 bg-surface-high border border-border rounded px-2 py-1 text-[8px] font-black opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Session {i+1}</div>
                                 </div>
                              ))}
                              {sessions.length === 0 && <div className="w-full text-center text-[10px] font-black text-text-dim/10 pb-16 uppercase tracking-[0.4em]">Ready for Init</div>}
                         </div>
                         <div className="flex justify-between text-[8px] font-bold text-text-dim/30 px-2 uppercase"><span>Macro-Monday</span><span>Macro-Sunday</span></div>
                    </div>
                </div>
            );

            // --- Submodal Environment ---

            const LibraryLayer = () => {
                const [activeCat, setActiveCat] = useState(null);
                const filtered = useMemo(() => {
                    let acc = [];
                    Object.entries(MASTER_LIBRARY).forEach(([muscle, list]) => {
                        if (!activeCat || activeCat === muscle) {
                            list.forEach(name => {
                                if (!libUI.search || name.toLowerCase().includes(libUI.search.toLowerCase())) acc.push({ name, muscle });
                            });
                        }
                    });
                    return acc;
                }, [activeCat, libUI.search]);

                const commitSelection = (name) => {
                    const n = [...program]; n[libUI.target.d].exercises[libUI.target.e].name = name;
                    setProgram(n); setLibUI({...libUI, open: false});
                };

                return (
                    <motion.div initial={{y:'100%'}} animate={{y:0}} exit={{y:'100%'}} className="fixed inset-0 z-[100] bg-bg flex flex-col no-scrollbar">
                        <header className="p-4 border-b border-border/50 flex justify-between items-center bg-surface-low/90 backdrop-blur-2xl sticky top-0 z-50">
                            <div className="flex items-center gap-3">
                                <h2 className="text-sm font-black text-white uppercase tracking-tight">System Knowledge Base</h2>
                                <span className="bg-accent/20 border border-accent/20 rounded-lg text-accent text-[8px] px-2 py-1 font-black uppercase tracking-widest">{filtered.length} UNITS</span>
                            </div>
                            <button onClick={()=>setLibUI({...libUI, open:false})} className="w-12 h-12 bg-surface-mid border border-border rounded-2xl flex items-center justify-center text-text-dim"><Icon name="x" /></button>
                        </header>
                        <div className="p-6 space-y-6">
                            <div className="relative group">
                                <Icon name="search" cls="absolute left-4 top-1/2 -translate-y-1/2 text-text-dim group-focus-within:text-accent w-4 h-4 transition-colors" />
                                <input type="text" placeholder="Query elite biomechanics..." value={libUI.search} onChange={(e)=>setLibUI({...libUI, search:e.target.value})} className="w-full bg-surface-mid border border-border h-14 rounded-2xl pl-12 pr-6 text-sm font-black text-white outline-none focus:ring-1 focus:ring-accent/40" />
                            </div>
                            <div className="flex gap-2.5 overflow-x-auto no-scrollbar -mx-6 px-6 pb-2">
                                <button onClick={()=>setActiveCat(null)} className={`px-6 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest border-2 transition-all ${!activeCat ? 'bg-accent border-accent text-black shadow-xl' : 'bg-surface-mid border-border text-text-dim/60 opacity-60'}`}>Universal</button>
                                {Object.keys(MASTER_LIBRARY).map(c => (
                                    <button key={c} onClick={()=>setActiveCat(c)} className={`px-6 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest border-2 transition-all ${activeCat === c ? 'bg-accent border-accent text-black shadow-xl' : 'bg-surface-mid border-border text-text-dim/60 opacity-60'}`}>{c.split('(')[0]}</button>
                                ))}
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto px-6 pb-32 space-y-2.5">
                            {filtered.map((unit, i) => (
                                <button key={i} onClick={()=>commitSelection(unit.name)} className="w-full h-20 bg-surface-mid border border-border rounded-[1.5rem] p-4 flex justify-between items-center group active:scale-[0.98] transition-all">
                                    <div className="flex items-center gap-4 text-left">
                                        <div className="w-12 h-12 bg-surface-high border border-border rounded-2xl flex items-center justify-center shadow-inner"><Icon name="dumb" cls="text-accent/30 group-hover:text-accent transition-colors w-6 h-6" /></div>
                                        <div>
                                            <div className="font-black text-white text-[14px] leading-none mb-1 group-hover:text-accent transition-colors">{unit.name}</div>
                                            <div className="text-[9px] uppercase font-black text-text-dim opacity-30 tracking-[0.2em]">{unit.muscle.split('(')[0]} Protocol</div>
                                        </div>
                                    </div>
                                    <div className="w-10 h-10 border border-accent/20 rounded-xl flex items-center justify-center bg-accent/5 group-hover:bg-accent group-hover:text-black transition-all"><Icon name="plus" cls="w-4 h-4" /></div>
                                </button>
                            ))}
                        </div>
                        <div className="fixed bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-bg to-transparent pointer-events-none"></div>
                    </motion.div>
                );
            };

            return (
                <div className="min-h-screen bg-bg text-slate-200 selection:bg-accent selection:text-black font-sans leading-none">
                    <div className="max-w-md mx-auto p-4 pt-12 relative z-10">
                        <AnimatePresence mode="wait">
                            {view === 'hub' && <motion.div key="v1" initial={{opacity:0, scale:0.98}} animate={{opacity:1, scale:1}} exit={{opacity:0, scale:0.98}}>{renderHub()}</motion.div>}
                            {view === 'workout' && <motion.div key="v2" initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} exit={{opacity:0, y:-10}}>{renderWorkout()}</motion.div>}
                            {view === 'plan' && <motion.div key="v3" initial={{opacity:0, x:10}} animate={{opacity:1, x:0}} exit={{opacity:0, x:-10}}>{renderEditor()}</motion.div>}
                            {view === 'data' && <motion.div key="v4" initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} exit={{opacity:0, y:-10}}>{renderData()}</motion.div>}
                        </AnimatePresence>
                    </div>

                    {/* Infinite Dock Docking System */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[94%] max-w-[400px] z-[90]">
                        <div className="glass-header rounded-[3rem] p-2.5 flex items-center justify-between dock-shadow border border-white/5">
                            <button onClick={()=>setView('hub')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 h-15 rounded-[2.5rem] transition-all duration-500 ${view === 'hub' ? 'bg-accent text-black font-black shadow-lg shadow-accent/20 scale-100' : 'text-text-dim opacity-40 scale-90'}`}><Icon name="hub" cls="w-5 h-5" /><span className="text-[7.5px] uppercase font-black tracking-widest">Master Hub</span></button>
                            <button onClick={()=>setView('workout')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 h-15 rounded-[2.5rem] transition-all duration-500 ${view === 'workout' ? 'bg-accent text-black font-black shadow-lg shadow-accent/20 scale-100' : 'text-text-dim opacity-40 scale-90'}`}><Icon name="zap" cls="w-5 h-5" /><span className="text-[7.5px] uppercase font-black tracking-widest">Protocol</span></button>
                            <button onClick={()=>setView('plan')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 h-15 rounded-[2.5rem] transition-all duration-500 ${view === 'plan' ? 'bg-accent text-black font-black shadow-lg shadow-accent/20 scale-100' : 'text-text-dim opacity-40 scale-90'}`}><Icon name="plan" cls="w-5 h-5" /><span className="text-[7.5px] uppercase font-black tracking-widest">Split</span></button>
                            <button onClick={()=>setView('data')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 h-15 rounded-[2.5rem] transition-all duration-500 ${view === 'data' ? 'bg-accent text-black font-black shadow-lg shadow-accent/20 scale-100' : 'text-text-dim opacity-40 scale-90'}`}><Icon name="data" cls="w-5 h-5" /><span className="text-[7.5px] uppercase font-black tracking-widest">Stats</span></button>
                        </div>
                    </div>

                    <AnimatePresence>{libUI.open && <LibraryLayer />}</AnimatePresence>
                    <div className="pb-32"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
