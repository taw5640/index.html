<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EYAD HYPERTROPHY SYSTEM – ULTIMATE EDITION</title>

<style>
/* =========================
   CORE RESET & ROOT
========================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

:root{
--bg:#050505;
--card:#0f0f13;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
--blue:#00e5ff;
--violet:#8a2eff;
--text:#eaeaea;
--muted:#777;
}

body{
background: radial-gradient(circle at top, #0a0a12, #000);
color:var(--text);
overflow-x:hidden;
}

/* =========================
   LOADER
========================= */
#loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
}

.loader-text{
font-size:40px;
letter-spacing:6px;
background:linear-gradient(90deg,var(--blue),var(--violet));
-webkit-background-clip:text;
color:transparent;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px var(--blue));}
to{filter:drop-shadow(0 0 20px var(--violet));}
}

/* =========================
   LAYOUT
========================= */
.container{
padding:20px;
max-width:1300px;
margin:auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,var(--blue),var(--violet));
-webkit-background-clip:text;
color:transparent;
}

/* =========================
   CARDS
========================= */
.card{
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
transition:.3s;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.card:hover{
transform:translateY(-5px) scale(1.01);
}

/* =========================
   BUTTONS
========================= */
.btn{
padding:10px 20px;
border-radius:10px;
border:none;
cursor:pointer;
background:linear-gradient(135deg,var(--blue),var(--violet));
color:black;
font-weight:600;
transition:.2s;
}

.btn:hover{
transform:scale(1.05);
filter:brightness(1.2);
}

/* =========================
   GRID
========================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

/* =========================
   WORKOUT LIST
========================= */
.exercise{
padding:10px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
}

.exercise:last-child{
border:none;
}

.sets{
color:var(--muted);
}

/* =========================
   TIMER
========================= */
.timer{
font-size:30px;
text-align:center;
margin:10px 0;
}

/* =========================
   PROGRESS
========================= */
.progress{
height:8px;
background:#111;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,var(--blue),var(--violet));
width:0%;
transition:0.4s;
}

/* =========================
   ANALYTICS
========================= */
.analytics{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
color:var(--muted);
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){
header{
flex-direction:column;
gap:10px;
}
}
</style>
</head>

<body>

<div id="loader">
<div class="loader-text">EYAD</div>
</div>

<div class="container" id="app" style="display:none;">

<header>
<div class="title">EYAD HYPERTROPHY SYSTEM</div>
<button class="btn" onclick="resetData()">Reset</button>
</header>

<div class="grid">

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<div class="analytics">
<span>Workouts</span>
<span id="totalWorkouts">0</span>
</div>
<div class="analytics">
<span>PRs</span>
<span id="totalPRs">0</span>
</div>
<div class="analytics">
<span>Volume</span>
<span id="totalVolume">0</span>
</div>
</div>

<!-- WORKOUT MODE -->
<div class="card">
<h3>Workout Mode</h3>
<select id="daySelect" onchange="loadWorkout()">
<option value="0">Posterior A</option>
<option value="1">Anterior A</option>
<option value="2">Posterior B</option>
<option value="3">Anterior B</option>
</select>

<div id="workoutList"></div>

<button class="btn" onclick="completeWorkout()">Complete Workout</button>
</div>

<!-- TIMER -->
<div class="card">
<h3>Rest Timer</h3>
<div class="timer" id="timer">60</div>
<button class="btn" onclick="startTimer()">Start</button>
</div>

<!-- PROGRESS -->
<div class="card">
<h3>Progress</h3>
<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>
</div>

<!-- HISTORY -->
<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

</div>
</div>

<script>
/* =========================
   LOADER
========================= */
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("app").style.display="block";
},2000);

/* =========================
   DATA
========================= */
const workouts=[
[
["Incline Barbell Chest Press",2],
["Flat Barbell Bench Press",2],
["Decline Barbell Bench Press",2],
["Seated Dumbbell Shoulder Press",2],
["Dumbbell Lateral Raises",2],
["Incline Dumbbell Biceps Curl",3],
["EZ-Bar Preacher Curl",2],
["Dumbbell Hammer Curl",2],
["Leg Extension",3],
["Adductor Machine",2]
],
[
["T-Bar Row",2],
["Wide-Grip Lat Pulldown",2],
["Straight-Arm Lat Pulldown",2],
["Reverse Pec Deck",3],
["Overhead Cable Triceps Extension",3],
["Cable Triceps Pushdown",2],
["Single-Arm Cable Pushdown",2],
["Leg Press",3],
["Standing Calf Raises",3],
["Back Extension",2]
],
[
["Flat Barbell Bench Press",2],
["Incline Barbell Chest Press",2],
["Decline Barbell Bench Press",2],
["Incline Dumbbell Biceps Curl",3],
["EZ-Bar Preacher Curl",2],
["Dumbbell Hammer Curl",2],
["Seated Dumbbell Shoulder Press",2],
["Dumbbell Lateral Raises",2],
["Leg Extension",3],
["Adductor Machine",2]
],
[
["T-Bar Row",2],
["Wide-Grip Lat Pulldown",2],
["Straight-Arm Lat Pulldown",2],
["Reverse Pec Deck",3],
["Overhead Cable Triceps Extension",3],
["Cable Triceps Pushdown",2],
["Single-Arm Cable Pushdown",2],
["Leg Press",3],
["Standing Calf Raises",3],
["Back Extension",2]
]
];

/* =========================
   LOAD WORKOUT
========================= */
function loadWorkout(){
let day=document.getElementById("daySelect").value;
let list=document.getElementById("workoutList");
list.innerHTML="";

workouts[day].forEach((ex,i)=>{
let div=document.createElement("div");
div.className="exercise";
div.innerHTML=`
<span>${ex[0]}</span>
<span class="sets">${ex[1]} sets</span>
`;
list.appendChild(div);
});
}

loadWorkout();

/* =========================
   TIMER
========================= */
let interval;
function startTimer(){
let time=60;
clearInterval(interval);
interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0) clearInterval(interval);
},1000);
}

/* =========================
   STORAGE
========================= */
function getData(){
return JSON.parse(localStorage.getItem("eyadData")) || {
workouts:0,
prs:0,
volume:0,
history:[]
};
}

function saveData(data){
localStorage.setItem("eyadData",JSON.stringify(data));
}

/* =========================
   COMPLETE WORKOUT
========================= */
function completeWorkout(){
let data=getData();
data.workouts++;
data.volume+=Math.floor(Math.random()*500);

if(Math.random()>0.7){
data.prs++;
}

data.history.push({
date:new Date().toLocaleDateString(),
volume:data.volume
});

saveData(data);
updateUI();
}

/* =========================
   UPDATE UI
========================= */
function updateUI(){
let data=getData();

document.getElementById("totalWorkouts").innerText=data.workouts;
document.getElementById("totalPRs").innerText=data.prs;
document.getElementById("totalVolume").innerText=data.volume;

document.getElementById("progressBar").style.width=
Math.min(data.workouts*10,100)+"%";

let history=document.getElementById("history");
history.innerHTML="";

data.history.slice(-5).forEach(h=>{
let div=document.createElement("div");
div.innerText=`${h.date} - ${h.volume}`;
history.appendChild(div);
});
}

updateUI();

/* =========================
   RESET
========================= */
function resetData(){
localStorage.removeItem("eyadData");
updateUI();
}
</script>

</body>
</html>
